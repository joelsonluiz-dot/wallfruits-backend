services:
  - type: web
    name: wallfruits-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: false
      - key: REDIS_ENABLED
        value: false
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: SUPABASE_AUTH_ENABLED
        value: true
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: API_TITLE
        value: WallFruits API
      - key: API_VERSION
        value: 2.0.0
      - key: CORS_ORIGINS
        value: '["https://wallfruits-backend.onrender.com","https://wallfruits-api.onrender.com"]'
      - key: ALLOWED_HOSTS
        value: '["wallfruits-backend.onrender.com","wallfruits-api.onrender.com"]'
