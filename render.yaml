databases:
  - name: wallfruits-db
    databaseName: wallfruits_db
    user: wallfruits
    plan: free

services:
  - type: web
    name: wallfruits-api
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DEBUG
        value: false
      - key: REDIS_ENABLED
        value: false
      - key: DATABASE_URL
        fromDatabase:
          name: wallfruits-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: 60
      - key: API_TITLE
        value: WallFruits API
      - key: API_VERSION
        value: 2.0.0
      - key: CORS_ORIGINS
        value: '["https://wallfruits-api.onrender.com"]'
      - key: ALLOWED_HOSTS
        value: '["wallfruits-api.onrender.com"]'
