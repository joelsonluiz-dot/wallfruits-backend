<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WallFruits - Teste Manual de API</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2.5em;
        }
        .subtitle {
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }
        .status-box {
            background: #f8f9fa;
            border-left: 4px solid #28a745;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .error-box {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 5px;
        }
        .section {
            background: #f8f9fa;
            padding: 20px;
            margin-bottom: 20px;
            border-radius: 10px;
        }
        .section h2 {
            color: #333;
            margin-bottom: 15px;
            font-size: 1.5em;
        }
        input, textarea, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 10px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            background: #667eea;
            color: white;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }
        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        .response {
            background: #fff;
            border: 2px solid #ddd;
            padding: 15px;
            margin-top: 10px;
            border-radius: 8px;
            white-space: pre-wrap;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            max-height: 400px;
            overflow-y: auto;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .token-display {
            background: #e3f2fd;
            padding: 10px;
            border-radius: 5px;
            margin-top: 10px;
            word-break: break-all;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍎 WallFruits - Teste de API</h1>
        <p class="subtitle">Interface de teste manual para o backend FastAPI</p>

        <div id="serverStatus" class="status-box">
            🔄 Verificando servidor...
        </div>

        <div class="section">
            <h2>🔐 1. Autenticação</h2>
            <div class="grid">
                <div>
                    <h3>Registrar Usuário</h3>
                    <input type="text" id="reg_name" placeholder="Nome completo" value="João Silva">
                    <input type="email" id="reg_email" placeholder="Email" value="joao@test.com">
                    <input type="password" id="reg_password" placeholder="Senha" value="senha123">
                    <select id="reg_role">
                        <option value="buyer">Comprador</option>
                        <option value="producer">Produtor</option>
                    </select>
                    <button onclick="register()">Registrar</button>
                    <div id="reg_response" class="response" style="display:none"></div>
                </div>

                <div>
                    <h3>Login</h3>
                    <input type="email" id="login_email" placeholder="Email" value="joao@test.com">
                    <input type="password" id="login_password" placeholder="Senha" value="senha123">
                    <button onclick="login()">Fazer Login</button>
                    <div id="login_response" class="response" style="display:none"></div>
                    <div id="token_display" class="token-display" style="display:none"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>📦 2. Ofertas</h2>
            <div class="grid">
                <div>
                    <h3>Criar Oferta</h3>
                    <input type="text" id="offer_product" placeholder="Nome do produto" value="Maçã Gala">
                    <textarea id="offer_desc" placeholder="Descrição" rows="2">Maçãs frescas e orgânicas</textarea>
                    <input type="number" id="offer_quantity" placeholder="Quantidade" value="100">
                    <input type="number" id="offer_price" placeholder="Preço" value="5.50" step="0.01">
                    <input type="text" id="offer_unit" placeholder="Unidade" value="kg">
                    <button onclick="createOffer()">Criar Oferta</button>
                    <div id="offer_response" class="response" style="display:none"></div>
                </div>

                <div>
                    <h3>Listar Ofertas</h3>
                    <button onclick="listOffers()">Buscar Todas Ofertas</button>
                    <button onclick="listMyOffers()">Minhas Ofertas</button>
                    <div id="list_response" class="response" style="display:none"></div>
                </div>
            </div>
        </div>

        <div class="section">
            <h2>💰 3. Transações</h2>
            <input type="text" id="trans_offer_id" placeholder="ID da Oferta">
            <input type="number" id="trans_quantity" placeholder="Quantidade" value="10">
            <button onclick="createTransaction()">Comprar</button>
            <button onclick="getTransactions()">Ver Minhas Transações</button>
            <div id="trans_response" class="response" style="display:none"></div>
        </div>

        <div class="section">
            <h2>📊 4. Dashboard</h2>
            <button onclick="getDashboard()">Ver Dashboard</button>
            <div id="dashboard_response" class="response" style="display:none"></div>
        </div>
    </div>

    <script>
        const API_URL = 'http://127.0.0.1:8000/api';
        let authToken = localStorage.getItem('auth_token') || '';

        // Verificar servidor ao carregar
        window.onload = async () => {
            try {
                const response = await fetch('http://127.0.0.1:8000/health');
                const data = await response.json();
                document.getElementById('serverStatus').innerHTML = 
                    '✅ Servidor Online - ' + data.version;
                document.getElementById('serverStatus').style.borderColor = '#28a745';
            } catch (error) {
                document.getElementById('serverStatus').innerHTML = 
                    '❌ Servidor Offline - Inicie com: python start.bat';
                document.getElementById('serverStatus').className = 'error-box';
            }

            if (authToken) {
                document.getElementById('token_display').style.display = 'block';
                document.getElementById('token_display').textContent = '🔑 Token: ' + authToken.substring(0, 50) + '...';
            }
        };

        async function apiRequest(endpoint, method = 'GET', body = null, requireAuth = false) {
            const headers = { 'Content-Type': 'application/json' };
            if (requireAuth && authToken) {
                headers['Authorization'] = `Bearer ${authToken}`;
            }

            const options = { method, headers };
            if (body) options.body = JSON.stringify(body);

            try {
                const response = await fetch(API_URL + endpoint, options);
                const data = await response.json();
                return { ok: response.ok, status: response.status, data };
            } catch (error) {
                return { ok: false, error: error.message };
            }
        }

        function showResponse(elementId, data) {
            const el = document.getElementById(elementId);
            el.style.display = 'block';
            el.textContent = JSON.stringify(data, null, 2);
        }

        async function register() {
            const body = {
                name: document.getElementById('reg_name').value,
                email: document.getElementById('reg_email').value,
                password: document.getElementById('reg_password').value,
                role: document.getElementById('reg_role').value
            };
            const result = await apiRequest('/auth/register', 'POST', body);
            showResponse('reg_response', result);
        }

        async function login() {
            const formData = new URLSearchParams();
            formData.append('username', document.getElementById('login_email').value);
            formData.append('password', document.getElementById('login_password').value);

            try {
                const response = await fetch(API_URL + '/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: formData
                });
                const data = await response.json();
                
                if (response.ok) {
                    authToken = data.access_token;
                    localStorage.setItem('auth_token', authToken);
                    document.getElementById('token_display').style.display = 'block';
                    document.getElementById('token_display').textContent = '🔑 Token: ' + authToken.substring(0, 50) + '...';
                }
                
                showResponse('login_response', data);
            } catch (error) {
                showResponse('login_response', { error: error.message });
            }
        }

        async function createOffer() {
            const body = {
                product_name: document.getElementById('offer_product').value,
                description: document.getElementById('offer_desc').value,
                quantity: parseFloat(document.getElementById('offer_quantity').value),
                price: parseFloat(document.getElementById('offer_price').value),
                unit: document.getElementById('offer_unit').value,
                category: "frutas"
            };
            const result = await apiRequest('/offers', 'POST', body, true);
            showResponse('offer_response', result);
        }

        async function listOffers() {
            const result = await apiRequest('/offers?limit=10');
            showResponse('list_response', result);
        }

        async function listMyOffers() {
            const result = await apiRequest('/offers/my', 'GET', null, true);
            showResponse('list_response', result);
        }

        async function createTransaction() {
            const body = {
                offer_id: document.getElementById('trans_offer_id').value,
                quantity: parseFloat(document.getElementById('trans_quantity').value)
            };
            const result = await apiRequest('/transactions', 'POST', body, true);
            showResponse('trans_response', result);
        }

        async function getTransactions() {
            const result = await apiRequest('/transactions/history', 'GET', null, true);
            showResponse('trans_response', result);
        }

        async function getDashboard() {
            const result = await apiRequest('/dashboard', 'GET', null, true);
            showResponse('dashboard_response', result);
        }
    </script>
</body>
</html>
