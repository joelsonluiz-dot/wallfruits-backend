<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}WallFruits - Marketplace{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <style>
        body { background-color: #f8f9fa; }
        .navbar-brand { font-weight: bold; }
        .card { margin-bottom: 20px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-success">
        <div class="container">
            <a class="navbar-brand" href="/">WallFruits</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/offers">Ofertas</a></li>
                    <li class="nav-item"><a class="nav-link" href="/qa">QA Browser Test</a></li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item"><a class="nav-link" href="/login">Entrar</a></li>
                    <li class="nav-item"><a class="nav-link" href="/register">Registrar</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>

    <script>
        // Função para fazer requisições à API
        async function apiRequest(url, method = 'GET', data = null) {
            const isAbsolute = url.startsWith('http://') || url.startsWith('https://');
            const apiUrl = isAbsolute || url.startsWith('/api') ? url : `/api${url.startsWith('/') ? url : `/${url}`}`;
            const config = {
                method: method,
                headers: {
                    'Content-Type': 'application/json',
                }
            };
            if (data) config.body = JSON.stringify(data);
            const token = localStorage.getItem('token');
            if (token) config.headers['Authorization'] = `Bearer ${token}`;
            const response = await fetch(apiUrl, config);

            let payload = null;
            const text = await response.text();
            if (text) {
                try {
                    payload = JSON.parse(text);
                } catch {
                    payload = { detail: text };
                }
            }

            if (!response.ok) {
                throw new Error(payload?.detail || `Erro HTTP ${response.status}`);
            }

            return payload;
        }

        function clearSessionToken() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
        }
    </script>
</body>
</html>
