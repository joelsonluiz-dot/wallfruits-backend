{% extends "base.html" %}

{% block title %}Entrar - WallFruits{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 2rem 0;
    }
    .auth-card {
        width: 100%;
        max-width: 420px;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 0.4rem;
    }
    .auth-header p {
        color: var(--wf-text-secondary);
        font-size: 0.9rem;
    }
    .auth-divider {
        display: flex;
        align-items: center;
        gap: 1rem;
        margin: 1.75rem 0;
        color: var(--wf-text-secondary);
        font-size: 0.8rem;
    }
    .auth-divider::before, .auth-divider::after {
        content: '';
        flex: 1;
        height: 1px;
        background: var(--wf-border);
    }
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--wf-text-secondary);
    }
    @media (max-width: 480px) {
        .auth-card { max-width: 100%; }
        .auth-header h1 { font-size: 1.5rem; }
        .auth-wrapper { padding: 1rem 0; min-height: calc(100vh - 160px); }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Bem-vindo de volta</h1>
            <p>Entre na sua conta para continuar</p>
        </div>

        <div class="wf-card">
            <div class="card-body" style="padding: 2rem;">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="wf-label">Email</label>
                        <input type="email" class="wf-input form-control" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-4">
                        <label for="password" class="wf-label">Senha</label>
                        <input type="password" class="wf-input form-control" id="password" placeholder="&bull;&bull;&bull;&bull;&bull;&bull;&bull;&bull;" required>
                    </div>
                    <button type="submit" class="btn btn-wf-primary w-100" style="padding: 0.75rem;">
                        Entrar &rarr;
                    </button>
                </form>

                <div class="auth-divider">ou</div>

                <button type="button" class="btn btn-wf-secondary w-100" id="clearTokenBtn">
                    Sair da sessão atual
                </button>
            </div>
        </div>

        <div class="auth-footer">
            Não tem conta? <a href="/register" class="wf-link">Criar conta grátis</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await apiRequest('/auth/login', 'POST', { email, password });
            if (response.access_token) {
                localStorage.setItem('token', response.access_token);
                localStorage.setItem('user', JSON.stringify(response.user || {}));
                alert('Login realizado com sucesso. Token salvo no navegador.');
                window.location.href = '/';
            } else {
                alert('Erro no login: ' + (response.detail || 'Credenciais inválidas'));
            }
        } catch (error) {
            alert('Erro: ' + error.message);
        }
    });

    document.getElementById('clearTokenBtn').addEventListener('click', () => {
        clearSessionToken();
        alert('Token removido do navegador.');
    });
</script>
{% endblock %}
