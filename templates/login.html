{% extends "base.html" %}

{% block title %}Entrar - WallFruits{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Entrar</h3>
            </div>
            <div class="card-body">
                <form id="loginForm">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-success">Entrar</button>
                    <button type="button" class="btn btn-outline-secondary" id="clearTokenBtn">Sair (limpar token)</button>
                </form>
                <p class="mt-3">Não tem conta? <a href="/register">Registrar-se</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;

        try {
            const response = await apiRequest('/auth/login', 'POST', { email, password });
            if (response.access_token) {
                localStorage.setItem('token', response.access_token);
                localStorage.setItem('user', JSON.stringify(response.user || {}));
                alert('Login realizado com sucesso. Token salvo no navegador.');
                window.location.href = '/';
            } else {
                alert('Erro no login: ' + (response.detail || 'Credenciais inválidas'));
            }
        } catch (error) {
            alert('Erro: ' + error.message);
        }
    });

    document.getElementById('clearTokenBtn').addEventListener('click', () => {
        clearSessionToken();
        alert('Token removido do navegador.');
    });
</script>
{% endblock %}
