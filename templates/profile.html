{% extends "base.html" %}

{% block title %}Perfil - WallFruits{% endblock %}

{% block content %}
<style>
    .profile-wrap { display: grid; gap: 1rem; }
    .profile-header { display: grid; grid-template-columns: 120px 1fr auto; gap: 1rem; align-items: center; }
    .profile-avatar {
        width: 110px; height: 110px; border-radius: 50%; object-fit: cover;
        border: 2px solid var(--wf-border); background: rgba(255,255,255,0.06);
    }
    .profile-avatar-fallback {
        width: 110px; height: 110px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
        font-size: 2rem; font-weight: 800; background: var(--wf-accent-glow); color: var(--wf-accent);
        border: 2px solid rgba(0,212,170,0.25);
    }
    .profile-name { font-size: 1.5rem; font-weight: 800; margin: 0; }
    .profile-username { color: var(--wf-text-secondary); margin-top: 0.15rem; }
    .profile-meta { display: flex; gap: 1rem; flex-wrap: wrap; margin-top: 0.5rem; color: var(--wf-text-secondary); }
    .profile-stats { display: flex; gap: 1rem; flex-wrap: wrap; }
    .profile-stat { background: rgba(255,255,255,0.04); border: 1px solid var(--wf-border); border-radius: 12px; padding: 0.5rem 0.8rem; }
    .profile-stat b { color: var(--wf-text); }
    .offers-grid { display: grid; grid-template-columns: repeat(3, minmax(0, 1fr)); gap: 1rem; }
    .offer-mini { cursor: pointer; }
    .offer-mini img { width: 100%; height: 180px; object-fit: cover; border-radius: 10px; }
    .offer-mini .mini-body { padding-top: 0.55rem; }
    .settings-grid { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 0.75rem; }
    @media (max-width: 860px) {
        .profile-header { grid-template-columns: 1fr; }
        .offers-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
        .settings-grid { grid-template-columns: 1fr; }
    }
    @media (max-width: 520px) {
        .offers-grid { grid-template-columns: 1fr; }
    }
</style>

<div class="profile-wrap" id="profilePageRoot" data-viewed-user-id="{{ viewed_user_id if viewed_user_id is not none else '' }}">
    <div class="wf-card">
        <div class="card-body">
            <div class="profile-header">
                <div id="profileAvatar"></div>

                <div>
                    <h1 class="profile-name" id="profileName">Perfil</h1>
                    <div class="profile-username" id="profileUsername"></div>
                    <div class="profile-meta" id="profileMeta"></div>
                    <p id="profileBio" style="margin-top:0.6rem; margin-bottom:0;"></p>
                </div>

                <div class="d-flex flex-column gap-2" id="profileActions"></div>
            </div>

            <div class="profile-stats mt-3" id="profileStats"></div>
        </div>
    </div>

    <div class="wf-card" id="mySettingsCard" style="display:none;">
        <div class="card-header">Configurações do Meu Perfil</div>
        <div class="card-body">
            <form id="profileSettingsForm" class="d-grid gap-3">
                <div class="settings-grid">
                    <div>
                        <label class="wf-label">Nome</label>
                        <input id="editName" class="wf-input form-control" type="text" minlength="2" maxlength="150">
                    </div>
                    <div>
                        <label class="wf-label">Localização</label>
                        <input id="editLocation" class="wf-input form-control" type="text" maxlength="150">
                    </div>
                    <div style="grid-column: 1 / -1;">
                        <label class="wf-label">Bio</label>
                        <textarea id="editBio" class="wf-input form-control" maxlength="500" rows="3"></textarea>
                    </div>
                </div>

                <div>
                    <label class="wf-label">Imagem de Perfil (upload)</label>
                    <input id="profileImageFile" class="wf-input form-control" type="file" accept="image/*">
                </div>

                <div class="d-flex gap-2 flex-wrap">
                    <button class="btn btn-wf-primary" type="submit">Salvar perfil</button>
                    <button class="btn btn-wf-secondary" type="button" onclick="loadProfile()">Atualizar</button>
                    <button class="btn btn-wf-danger" type="button" id="becomeAdminBtn">Tornar-me Admin Geral</button>
                </div>
            </form>
        </div>
    </div>

    <div class="wf-card">
        <div class="card-header">Ofertas Publicadas</div>
        <div class="card-body">
            <div class="offers-grid" id="offersGrid"></div>
            <div id="emptyOffers" class="wf-alert wf-alert-info" style="display:none; margin-top:0.8rem;">Nenhuma oferta publicada ainda.</div>
        </div>
    </div>
</div>

<script>
    const viewedUserIdRaw = document.getElementById('profilePageRoot').dataset.viewedUserId;
    const viewedUserId = viewedUserIdRaw ? Number(viewedUserIdRaw) : null;

    function resolveAvatar(url) {
        if (!url) return null;
        if (url.startsWith('http://') || url.startsWith('https://') || url.startsWith('/')) return url;
        return `/api/uploads/profiles/${url}`;
    }

    function initials(name) {
        return (name || 'U').split(' ').filter(Boolean).slice(0, 2).map(p => p[0].toUpperCase()).join('') || 'U';
    }

    function currency(v) {
        if (v === null || v === undefined) return 'R$ -';
        return `R$ ${Number(v).toFixed(2)}`;
    }

    async function getCurrentUser() {
        const token = localStorage.getItem('token');
        if (!token) return null;
        try { return await apiRequest('/auth/me'); } catch { return null; }
    }

    async function uploadProfileImage(file) {
        const token = localStorage.getItem('token');
        if (!token || !file) return;

        const fd = new FormData();
        fd.append('file', file);

        const response = await fetch('/api/uploads/profile-image', {
            method: 'POST',
            headers: { Authorization: `Bearer ${token}` },
            body: fd,
        });

        const payload = await response.json();
        if (!response.ok) throw new Error(payload?.detail || 'Falha no upload da imagem');
        return payload;
    }

    async function followUser(userId, shouldFollow) {
        const method = shouldFollow ? 'POST' : 'DELETE';
        await apiRequest(`/social/users/${userId}/follow`, method);
        await loadProfile();
    }

    function renderOffers(offers) {
        const grid = document.getElementById('offersGrid');
        const empty = document.getElementById('emptyOffers');

        if (!offers.length) {
            grid.innerHTML = '';
            empty.style.display = 'block';
            return;
        }

        empty.style.display = 'none';
        grid.innerHTML = offers.map((offer) => {
            const image = offer.images && offer.images.length ? offer.images[0] : 'data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="500" height="280"><rect width="100%" height="100%" fill="%231a1a23"/></svg>';
            const safeImage = image.startsWith('/') || image.startsWith('http') ? image : `/api/uploads/offers/${image}`;
            return `
                <article class="offer-mini" onclick="window.location.href='/offers/${offer.id}'">
                    <img src="${safeImage}" alt="${offer.product_name}">
                    <div class="mini-body">
                        <div style="font-weight:700;">${offer.product_name}</div>
                        <div style="color:var(--wf-text-secondary);font-size:0.9rem;">${currency(offer.price)} / ${offer.unit || 'kg'}</div>
                    </div>
                </article>
            `;
        }).join('');
    }

    async function loadProfile() {
        const currentUser = await getCurrentUser();
        const targetUserId = viewedUserId || currentUser?.id;

        if (!targetUserId) {
            window.location.href = '/login';
            return;
        }

        const data = await apiRequest(`/social/users/${targetUserId}`);

        const avatarEl = document.getElementById('profileAvatar');
        const avatarUrl = resolveAvatar(data.profile_image);
        avatarEl.innerHTML = avatarUrl
            ? `<img class="profile-avatar" src="${avatarUrl}" alt="Avatar">`
            : `<div class="profile-avatar-fallback">${initials(data.name)}</div>`;

        document.getElementById('profileName').textContent = data.name;
        document.getElementById('profileUsername').textContent = data.username;
        document.getElementById('profileMeta').innerHTML = `
            <span>${data.role}</span>
            <span>${data.location || 'Sem localização'}</span>
            <span>${data.email}</span>
        `;
        document.getElementById('profileBio').textContent = data.bio || 'Sem bio informada.';

        document.getElementById('profileStats').innerHTML = `
            <div class="profile-stat"><b>${data.total_offers}</b> ofertas</div>
            <div class="profile-stat"><b>${data.followers_count}</b> seguidores</div>
            <div class="profile-stat"><b>${data.following_count}</b> seguindo</div>
        `;

        const isMe = currentUser && Number(currentUser.id) === Number(data.id);
        const actionsEl = document.getElementById('profileActions');

        if (isMe) {
            actionsEl.innerHTML = `<a class="btn btn-wf-primary" href="/me/profile">Meu perfil</a>`;
            document.getElementById('mySettingsCard').style.display = 'block';
            document.getElementById('editName').value = data.name || '';
            document.getElementById('editLocation').value = data.location || '';
            document.getElementById('editBio').value = data.bio || '';

            const userRaw = localStorage.getItem('user');
            const localUser = userRaw ? JSON.parse(userRaw) : {};
            if (localUser?.role === 'admin') {
                document.getElementById('becomeAdminBtn').style.display = 'none';
            }
        } else {
            actionsEl.innerHTML = `
                <button class="btn ${data.is_following ? 'btn-wf-secondary' : 'btn-wf-primary'}" onclick="followUser(${data.id}, ${!data.is_following})">
                    ${data.is_following ? 'Seguindo (clique para deixar)' : 'Seguir'}
                </button>
            `;
            document.getElementById('mySettingsCard').style.display = 'none';
        }

        renderOffers(data.offers || []);
    }

    document.getElementById('profileSettingsForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const payload = {
            name: document.getElementById('editName').value,
            location: document.getElementById('editLocation').value || null,
            bio: document.getElementById('editBio').value || null,
        };

        await apiRequest('/auth/me', 'PUT', payload);

        const file = document.getElementById('profileImageFile').files[0];
        if (file) {
            await uploadProfileImage(file);
        }

        alert('Perfil atualizado com sucesso.');
        await loadProfile();
    });

    document.getElementById('becomeAdminBtn').addEventListener('click', async () => {
        try {
            const result = await apiRequest('/auth/bootstrap-admin', 'POST');
            const userRaw = localStorage.getItem('user');
            const user = userRaw ? JSON.parse(userRaw) : {};
            user.role = 'admin';
            localStorage.setItem('user', JSON.stringify(user));

            alert(result.message || 'Agora você é admin geral.');
            window.location.href = '/admin';
        } catch (error) {
            alert(error.message || 'Não foi possível promover para admin.');
        }
    });

    loadProfile().catch((err) => {
        alert(err.message || 'Erro ao carregar perfil');
    });
</script>
{% endblock %}
