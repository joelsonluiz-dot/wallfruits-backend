{% extends "base.html" %}

{% block title %}Registrar - WallFruits{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card">
            <div class="card-header">
                <h3>Registrar-se</h3>
            </div>
            <div class="card-body">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="name" class="form-label">Nome</label>
                        <input type="text" class="form-control" id="name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <input type="password" class="form-control" id="password" required>
                    </div>
                    <div class="mb-3">
                        <label for="phone" class="form-label">Telefone</label>
                        <input type="tel" class="form-control" id="phone">
                    </div>
                    <div class="mb-3">
                        <label for="location" class="form-label">Localização</label>
                        <input type="text" class="form-control" id="location" placeholder="Cidade/UF">
                    </div>
                    <div class="mb-3">
                        <label for="role" class="form-label">Tipo de conta</label>
                        <select id="role" class="form-select">
                            <option value="buyer" selected>Comprador (buyer)</option>
                            <option value="producer">Produtor (producer)</option>
                        </select>
                    </div>
                    <button type="submit" class="btn btn-success">Registrar</button>
                </form>
                <p class="mt-3">Já tem conta? <a href="/login">Entrar</a></p>
            </div>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const location = document.getElementById('location').value;
        const role = document.getElementById('role').value;

        try {
            await apiRequest('/auth/register', 'POST', {
                name,
                email,
                password,
                phone: phone || null,
                location: location || null,
                role
            });

            alert('Registro bem-sucedido! Faça login.');
                window.location.href = '/login';
        } catch (error) {
            alert('Erro: ' + error.message);
        }
    });
</script>
{% endblock %}
