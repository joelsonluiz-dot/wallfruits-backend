{% extends "base.html" %}

{% block title %}Criar Conta - WallFruits{% endblock %}

{% block content %}
<style>
    .auth-wrapper {
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: calc(100vh - 200px);
        padding: 2rem 0;
    }
    .auth-card {
        width: 100%;
        max-width: 460px;
    }
    .auth-header {
        text-align: center;
        margin-bottom: 2rem;
    }
    .auth-header h1 {
        font-size: 1.8rem;
        font-weight: 800;
        letter-spacing: -0.5px;
        margin-bottom: 0.4rem;
    }
    .auth-header p {
        color: var(--wf-text-secondary);
        font-size: 0.9rem;
    }
    .auth-footer {
        text-align: center;
        margin-top: 1.5rem;
        font-size: 0.9rem;
        color: var(--wf-text-secondary);
    }
    .role-selector {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
    }
    .role-option {
        position: relative;
        cursor: pointer;
    }
    .role-option input {
        position: absolute;
        opacity: 0;
        pointer-events: none;
    }
    .role-option-label {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0.4rem;
        padding: 1rem;
        background: rgba(255,255,255,0.03);
        border: 1px solid var(--wf-border);
        border-radius: var(--wf-radius-sm);
        font-size: 0.85rem;
        font-weight: 600;
        transition: all 0.25s ease;
        text-align: center;
    }
    .role-option-label .role-icon {
        font-size: 1.5rem;
    }
    .role-option-label .role-desc {
        font-size: 0.75rem;
        font-weight: 400;
        color: var(--wf-text-secondary);
    }
    .role-option input:checked + .role-option-label {
        border-color: var(--wf-accent);
        background: var(--wf-accent-glow);
        color: var(--wf-accent);
    }
    .role-option:hover .role-option-label {
        border-color: rgba(255,255,255,0.12);
    }
    @media (max-width: 480px) {
        .auth-card { max-width: 100%; }
        .auth-header h1 { font-size: 1.5rem; }
        .role-selector { grid-template-columns: 1fr 1fr; gap: 0.5rem; }
        .role-option-label { padding: 0.75rem 0.5rem; }
        .role-option-label .role-icon { font-size: 1.25rem; }
        .role-option-label .role-desc { font-size: 0.68rem; }
    }
</style>

<div class="auth-wrapper">
    <div class="auth-card">
        <div class="auth-header">
            <h1>Crie sua conta</h1>
            <p>Junte-se ao futuro do marketplace</p>
        </div>

        <div class="wf-card">
            <div class="card-body" style="padding: 2rem;">
                <form id="registerForm">
                    <div class="mb-3">
                        <label for="name" class="wf-label">Nome completo</label>
                        <input type="text" class="wf-input form-control" id="name" placeholder="Seu nome" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="wf-label">Email</label>
                        <input type="email" class="wf-input form-control" id="email" placeholder="seu@email.com" required>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="wf-label">Senha</label>
                        <input type="password" class="wf-input form-control" id="password" placeholder="Mínimo 6 caracteres" required>
                    </div>
                    <div class="row g-3 mb-3">
                        <div class="col-6">
                            <label for="phone" class="wf-label">Telefone</label>
                            <input type="tel" class="wf-input form-control" id="phone" placeholder="(11) 99999-0000">
                        </div>
                        <div class="col-6">
                            <label for="location" class="wf-label">Localização</label>
                            <input type="text" class="wf-input form-control" id="location" placeholder="Cidade/UF">
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="wf-label">Tipo de conta</label>
                        <div class="role-selector">
                            <label class="role-option">
                                <input type="radio" name="role" value="buyer" checked>
                                <div class="role-option-label">
                                    <span class="role-icon">&#128722;</span>
                                    <span>Comprador</span>
                                    <span class="role-desc">Comprar produtos</span>
                                </div>
                            </label>
                            <label class="role-option">
                                <input type="radio" name="role" value="producer">
                                <div class="role-option-label">
                                    <span class="role-icon">&#127793;</span>
                                    <span>Produtor</span>
                                    <span class="role-desc">Vender produtos</span>
                                </div>
                            </label>
                        </div>
                    </div>
                    <div id="registerMsg" style="display:none; padding: 0.75rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.9rem;"></div>
                    <button type="submit" id="registerBtn" class="btn btn-wf-primary w-100" style="padding: 0.75rem;">
                        Criar conta &rarr;
                    </button>
                </form>
            </div>
        </div>

        <div class="auth-footer">
            Já tem conta? <a href="/login" class="wf-link">Entrar</a>
        </div>
    </div>
</div>

<script>
    document.getElementById('registerForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msgDiv = document.getElementById('registerMsg');
        const btn = document.getElementById('registerBtn');
        const name = document.getElementById('name').value;
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const phone = document.getElementById('phone').value;
        const location = document.getElementById('location').value;
        const roleEl = document.querySelector('input[name="role"]:checked');

        // Validações básicas no client
        if (!name || !email || !password) {
            msgDiv.style.display = 'block';
            msgDiv.style.background = 'rgba(255,60,60,0.15)';
            msgDiv.style.border = '1px solid #ff3c3c';
            msgDiv.style.color = '#ff6b6b';
            msgDiv.textContent = 'Preencha nome, email e senha.';
            return;
        }
        if (!roleEl) {
            msgDiv.style.display = 'block';
            msgDiv.style.background = 'rgba(255,60,60,0.15)';
            msgDiv.style.border = '1px solid #ff3c3c';
            msgDiv.style.color = '#ff6b6b';
            msgDiv.textContent = 'Selecione um tipo de conta.';
            return;
        }

        btn.disabled = true;
        btn.innerHTML = '<span style="display:inline-block;width:1rem;height:1rem;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:0.5rem;"></span> Criando conta...';
        msgDiv.style.display = 'none';

        try {
            await apiRequest('/auth/register', 'POST', {
                name,
                email,
                password,
                phone: phone || null,
                location: location || null,
                role: roleEl.value
            });

            msgDiv.style.display = 'block';
            msgDiv.style.background = 'rgba(0,255,136,0.15)';
            msgDiv.style.border = '1px solid #00ff88';
            msgDiv.style.color = '#00ff88';
            msgDiv.textContent = '✓ Conta criada com sucesso! Redirecionando...';
            setTimeout(() => { window.location.href = '/login'; }, 1500);
        } catch (error) {
            msgDiv.style.display = 'block';
            msgDiv.style.background = 'rgba(255,60,60,0.15)';
            msgDiv.style.border = '1px solid #ff3c3c';
            msgDiv.style.color = '#ff6b6b';
            msgDiv.textContent = '✗ ' + (error.message || 'Erro ao criar conta. Tente novamente.');
            btn.disabled = false;
            btn.innerHTML = 'Criar conta &rarr;';
        }
    });
</script>
<style>@keyframes spin{to{transform:rotate(360deg)}}</style>
{% endblock %}
