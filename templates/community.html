{% extends "base.html" %}

{% block title %}Comunidade Agro - WallFruits{% endblock %}

{% block content %}
<style>
    .community-wrap {
        max-width: 860px;
        margin: 0 auto;
        display: grid;
        gap: 0.8rem;
    }

    .community-header {
        border-radius: 16px;
        border: 1px solid rgba(11, 46, 99, 0.15);
        background: linear-gradient(120deg, #2e7d32 0%, #3c9342 55%, #7fbf54 100%);
        color: #fff;
        padding: 1rem 1rem 0.95rem;
        box-shadow: 0 12px 26px rgba(20, 76, 32, 0.24);
    }

    .community-header h1 {
        margin: 0;
        font-size: 1.34rem;
        font-weight: 900;
        letter-spacing: -0.01em;
    }

    .community-header p {
        margin: 0.32rem 0 0;
        font-size: 0.85rem;
        color: rgba(255, 255, 255, 0.92);
    }

    .community-refresh-controls {
        margin-top: 0.65rem;
        display: inline-flex;
        gap: 0.42rem;
        flex-wrap: wrap;
    }

    .community-refresh-btn {
        border: 1px solid rgba(0, 212, 170, 0.24);
        background: rgba(0, 212, 170, 0.08);
        color: #d8fff6;
        border-radius: 999px;
        padding: 0.34rem 0.66rem;
        font-size: 0.72rem;
        font-weight: 800;
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
        cursor: pointer;
    }

    .community-refresh-btn.is-paused {
        border-color: rgba(252, 90, 90, 0.3);
        color: #ff9f9f;
        background: rgba(214, 51, 51, 0.12);
    }

    .community-create {
        display: grid;
        gap: 0.7rem;
        border-radius: 16px;
        border: 1px solid rgba(11, 46, 99, 0.12);
        background: #fff;
        padding: 0.75rem;
        box-shadow: 0 10px 24px rgba(16, 44, 90, 0.09);
    }

    .community-input {
        border: 1px solid rgba(11, 46, 99, 0.16);
        border-radius: 14px;
        padding: 0.72rem 0.85rem;
        font-size: 0.92rem;
        font-weight: 600;
        color: #223f67;
        min-height: 92px;
        resize: vertical;
    }

    .community-input:focus {
        outline: none;
        border-color: #2e7d32;
        box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.16);
    }

    .community-create-actions {
        display: flex;
        gap: 0.5rem;
        align-items: center;
        justify-content: space-between;
        flex-wrap: wrap;
    }

    .community-upload {
        display: inline-flex;
        align-items: center;
        gap: 0.35rem;
        border: 1px solid rgba(46, 125, 50, 0.22);
        border-radius: 999px;
        padding: 0.45rem 0.72rem;
        color: #236228;
        background: rgba(46, 125, 50, 0.08);
        font-size: 0.8rem;
        font-weight: 800;
        cursor: pointer;
    }

    .community-upload input {
        display: none;
    }

    .community-send-btn {
        border: none;
        border-radius: 999px;
        padding: 0.48rem 0.86rem;
        font-size: 0.8rem;
        font-weight: 900;
        background: #2e7d32;
        color: #fff;
        display: inline-flex;
        gap: 0.28rem;
        align-items: center;
    }

    .community-preview {
        border: 1px dashed rgba(11, 46, 99, 0.2);
        border-radius: 12px;
        padding: 0.45rem;
        display: none;
        align-items: center;
        gap: 0.6rem;
    }

    .community-preview img {
        width: 70px;
        height: 70px;
        border-radius: 8px;
        object-fit: cover;
        border: 1px solid rgba(11, 46, 99, 0.16);
    }

    .community-preview small {
        color: #40618e;
        font-size: 0.76rem;
        font-weight: 700;
    }

    .community-feed {
        display: grid;
        gap: 0.65rem;
    }

    .community-feed-status {
        color: #45678f;
        font-size: 0.76rem;
        font-weight: 700;
        text-align: center;
        padding: 0.25rem 0;
    }

    .community-skeleton {
        min-height: 148px;
        border: 1px solid rgba(11, 46, 99, 0.12);
        border-radius: 14px;
        background: linear-gradient(90deg, rgba(242, 248, 255, 0.85) 20%, rgba(232, 243, 252, 0.98) 50%, rgba(242, 248, 255, 0.85) 80%);
        background-size: 200% 100%;
        animation: communityShimmer 1.2s infinite;
    }

    @keyframes communityShimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    .community-empty {
        border: 1px dashed rgba(11, 46, 99, 0.24);
        border-radius: 14px;
        padding: 1.2rem 1rem;
        background: #fff;
        color: #3f5f8b;
        text-align: center;
        font-weight: 700;
    }

    .post-card {
        border: 1px solid rgba(11, 46, 99, 0.12);
        border-radius: 14px;
        background: #fff;
        box-shadow: 0 8px 22px rgba(16, 44, 90, 0.08);
        overflow: hidden;
    }

    .post-card.feed-enter {
        opacity: 0;
        transform: translateY(8px);
    }

    .post-card.feed-enter.is-in {
        opacity: 1;
        transform: translateY(0);
        transition: opacity 0.2s ease, transform 0.2s ease;
    }

    .post-main {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 0.65rem;
        padding: 0.72rem;
    }

    .post-avatar {
        width: 46px;
        height: 46px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(11, 46, 99, 0.14);
        background: #eef4fb;
    }

        .post-avatar-link {
            display: inline-flex;
            width: 46px;
            height: 46px;
            border-radius: 50%;
            text-decoration: none;
        }

    .post-head {
        display: flex;
        align-items: center;
        gap: 0.4rem;
        flex-wrap: wrap;
    }

    .post-user {
        margin: 0;
        font-size: 0.86rem;
        font-weight: 900;
        color: #173e72;
    }

        .post-user-link {
            text-decoration: none;
            color: inherit;
            display: inline-flex;
            align-items: center;
        }

        .post-user-link:hover .post-user {
            text-decoration: underline;
            text-underline-offset: 2px;
        }

    .post-date {
        color: #5b7598;
        font-size: 0.68rem;
        font-weight: 700;
    }

    .post-badge {
        font-size: 0.63rem;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        border-radius: 999px;
        padding: 0.14rem 0.52rem;
        border: 1px solid rgba(46, 125, 50, 0.18);
        background: rgba(46, 125, 50, 0.08);
        color: #236228;
    }

    .post-text {
        margin: 0.38rem 0 0;
        color: #274a79;
        font-size: 0.84rem;
        line-height: 1.45;
        white-space: pre-wrap;
        word-break: break-word;
    }

    .post-image-wrap {
        margin-top: 0.55rem;
    }

    .post-image {
        width: 100%;
        max-height: 390px;
        object-fit: cover;
        border-radius: 11px;
        border: 1px solid rgba(11, 46, 99, 0.14);
        cursor: zoom-in;
    }

    .post-actions {
        display: flex;
        gap: 0.38rem;
        flex-wrap: wrap;
        margin-top: 0.58rem;
    }

    .post-action-btn {
        border: 1px solid rgba(11, 46, 99, 0.14);
        border-radius: 999px;
        background: #f4f9ff;
        color: #1f4b85;
        font-size: clamp(0.68rem, 1.9vw, 0.76rem);
        font-weight: 800;
        padding: clamp(0.3rem, 1.4vw, 0.4rem) clamp(0.5rem, 2.2vw, 0.62rem);
        display: inline-flex;
        align-items: center;
        gap: 0.2rem;
        cursor: pointer;
        min-height: 34px;
    }

    .post-action-btn .material-icons {
        font-size: 1rem;
    }

    .post-action-btn.moderation {
        background: #fff6f7;
        border-color: rgba(176, 46, 65, 0.26);
        color: #8f2437;
    }

    .post-action-btn.liked {
        border-color: rgba(203, 44, 73, 0.3);
        background: rgba(203, 44, 73, 0.1);
        color: #a9243e;
    }

    .post-comments {
        margin-top: 0.58rem;
        border: 1px solid rgba(11, 46, 99, 0.12);
        border-radius: 10px;
        padding: 0.48rem;
        background: #f8fbff;
        display: none;
        gap: 0.4rem;
    }

    .post-comments.visible {
        display: grid;
    }

    .post-comments-list {
        display: grid;
        gap: 0.32rem;
        max-height: 230px;
        overflow-y: auto;
    }

    .post-comment-item {
        border: 1px solid rgba(11, 46, 99, 0.1);
        border-radius: 9px;
        background: #fff;
        padding: 0.42rem 0.48rem;
    }

    .post-comment-meta {
        font-size: 0.66rem;
        color: #5d789c;
        font-weight: 800;
        margin-bottom: 0.12rem;
    }

    .post-comment-content {
        margin: 0;
        color: #234a7f;
        font-size: 0.76rem;
        line-height: 1.35;
        white-space: pre-wrap;
    }

    .post-comment-actions {
        margin-top: 0.2rem;
        display: flex;
        gap: 0.25rem;
        flex-wrap: wrap;
    }

    .comment-mod-btn {
        border: 1px solid rgba(176, 46, 65, 0.26);
        background: #fff6f7;
        color: #8f2437;
        border-radius: 999px;
        font-size: 0.62rem;
        font-weight: 800;
        padding: 0.18rem 0.44rem;
    }

    .post-card.post-focus {
        border-color: rgba(46, 125, 50, 0.42);
        box-shadow: 0 0 0 3px rgba(46, 125, 50, 0.12), 0 12px 28px rgba(16, 44, 90, 0.12);
    }

    .post-comment-form {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.35rem;
    }

    .post-comment-input {
        border: 1px solid rgba(11, 46, 99, 0.18);
        border-radius: 999px;
        padding: 0.38rem 0.6rem;
        font-size: 0.74rem;
        background: #fff;
    }

    .post-comment-send {
        border: none;
        border-radius: 999px;
        background: #2e7d32;
        color: #fff;
        font-size: clamp(0.68rem, 1.8vw, 0.74rem);
        font-weight: 800;
        padding: 0.4rem 0.68rem;
        min-height: 34px;
    }

    .img-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 2000;
        background: rgba(0, 0, 0, 0.8);
        align-items: center;
        justify-content: center;
        padding: 1rem;
    }

    .img-modal img {
        max-width: min(980px, 94vw);
        max-height: 92vh;
        border-radius: 12px;
        border: 1px solid rgba(255, 255, 255, 0.3);
    }

    @keyframes wfToastIn {
        0% {
            opacity: 0;
            transform: translateY(8px) scale(0.98);
        }
        100% {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .community-toast {
        position: fixed;
        right: 1rem;
        bottom: calc(92px + env(safe-area-inset-bottom));
        z-index: 1420;
        display: none;
        align-items: center;
        gap: 0.42rem;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 170, 0.34);
        background: rgba(7, 30, 44, 0.94);
        color: #d8fff6;
        padding: 0.44rem 0.7rem;
        font-size: 0.74rem;
        font-weight: 800;
        box-shadow: 0 14px 26px rgba(6, 24, 37, 0.34);
        transform-origin: right bottom;
        animation: wfToastIn 0.22s cubic-bezier(0.22, 1, 0.36, 1);
        max-width: min(92vw, 360px);
    }

    .community-toast .material-icons {
        font-size: 1rem;
        flex: 0 0 auto;
    }

    .community-toast span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    @media (max-width: 992px) {
        .community-wrap {
            max-width: 100%;
        }
    }

    @media (max-width: 768px) {
        .community-header {
            display: none;
        }

        .community-toast {
            right: 0.75rem;
            bottom: calc(84px + env(safe-area-inset-bottom));
            padding: 0.4rem 0.64rem;
            font-size: 0.71rem;
            box-shadow: 0 10px 18px rgba(6, 24, 37, 0.26);
            background: rgba(7, 30, 44, 0.9);
        }

        .community-header h1 {
            font-size: 1.15rem;
        }

        .community-header p {
            font-size: 0.8rem;
        }

        .community-create {
            padding: 0.52rem;
            gap: 0.5rem;
        }

        .community-input {
            min-height: 68px;
            padding: 0.58rem 0.72rem;
            font-size: 0.84rem;
        }

        .post-main {
            grid-template-columns: 42px 1fr;
            padding: 0.65rem;
        }

        .post-avatar {
            width: 42px;
            height: 42px;
        }
    }

    @media (max-width: 480px) {
        .community-create {
            padding: 0.46rem;
            gap: 0.44rem;
        }

        .community-input {
            min-height: 56px;
            padding: 0.5rem 0.64rem;
            font-size: 0.8rem;
        }

        .community-create-actions {
            align-items: stretch;
        }

        .community-upload,
        .community-send-btn {
            width: 100%;
            justify-content: center;
        }

        .post-actions {
            gap: 0.32rem;
        }

        .post-action-btn {
            flex: 1 1 auto;
            justify-content: center;
        }

        .post-comment-form {
            grid-template-columns: 1fr;
        }
    }
</style>

<div class="community-wrap">
    <header class="community-header">
        <h1>Comunidade Agro</h1>
        <p>Compartilhe produção, manejo e resultados com outros participantes do marketplace.</p>
        <div class="community-refresh-controls" aria-label="Controles de atualização automática">
            <button id="communityRefreshToggle" class="community-refresh-btn" type="button">
                <span class="material-icons">pause_circle</span>
                <span id="communityRefreshToggleText">Pausar auto-refresh</span>
            </button>
            <button id="communityRefreshInterval" class="community-refresh-btn" type="button">
                <span class="material-icons">schedule</span>
                <span id="communityRefreshIntervalText">45s</span>
            </button>
        </div>
    </header>

    <section class="community-create" aria-label="Criar publicação">
        <textarea id="communityPostInput" class="community-input" placeholder="Compartilhe algo sobre sua produção..."></textarea>

        <div id="communityPreview" class="community-preview">
            <img id="communityPreviewImg" alt="Pré-visualização da imagem">
            <small id="communityPreviewText"></small>
        </div>

        <div class="community-create-actions">
            <label class="community-upload">
                <span class="material-icons">image</span>
                <span>Adicionar imagem</span>
                <input type="file" id="communityImageInput" accept="image/*">
            </label>

            <button class="community-send-btn" id="communitySendBtn" type="button">
                <span class="material-icons">send</span>
                <span>Publicar</span>
            </button>
        </div>
    </section>

    <section id="communityFeed" class="community-feed" aria-live="polite"></section>
    <div id="communityFeedSentinel" style="height:2px;"></div>
    <div id="communityFeedStatus" class="community-feed-status"></div>
</div>

<div id="communityImgModal" class="img-modal" role="dialog" aria-modal="true" aria-label="Imagem ampliada">
    <img id="communityModalImg" alt="Imagem do post em tamanho ampliado">
</div>

<button id="communityToast" class="community-toast" type="button" aria-label="Ver novos posts">
    <span class="material-icons">north</span>
    <span id="communityToastText">Novos posts disponíveis</span>
</button>

<script>
    (function setupCommunityPage() {
        const postInput = document.getElementById('communityPostInput');
        const imageInput = document.getElementById('communityImageInput');
        const sendBtn = document.getElementById('communitySendBtn');
        const feed = document.getElementById('communityFeed');
        const previewWrap = document.getElementById('communityPreview');
        const previewImg = document.getElementById('communityPreviewImg');
        const previewText = document.getElementById('communityPreviewText');

        const modal = document.getElementById('communityImgModal');
        const modalImg = document.getElementById('communityModalImg');

        let pendingImage = null;
        const commentsCache = new Map();
        let postsCache = [];
        const currentUser = (() => {
            try {
                return JSON.parse(localStorage.getItem('user') || 'null');
            } catch {
                return null;
            }
        })();
        const isAdmin = currentUser?.role === 'admin';
        const focusPostId = Number(new URLSearchParams(window.location.search).get('post') || 0) || null;
        const COMMUNITY_PAGE_SIZE = 14;
        const COMMUNITY_SCROLL_KEY = 'wf_scroll_community';
        const COMMUNITY_AUTO_REFRESH_DEFAULT_MS = 45000;
        const COMMUNITY_AUTO_REFRESH_OPTIONS = [20000, 45000, 90000];
        const COMMUNITY_REFRESH_PAUSED_KEY = 'wf_community_refresh_paused';
        const COMMUNITY_REFRESH_INTERVAL_KEY = 'wf_community_refresh_interval_ms';
        const GLOBAL_TYPING_LOCK_KEY = 'wf_global_typing_context';
        let postsObserver = null;
        let lastSavedScrollY = 0;
        let postsRefreshTimer = null;
        let postsRefreshPaused = false;
        let postsRefreshIntervalMs = COMMUNITY_AUTO_REFRESH_DEFAULT_MS;
        const postsFeedState = {
            skip: 0,
            hasMore: true,
            isLoading: false,
            prefetch: null,
        };

        function refreshIntervalLabel(ms) {
            return `${Math.max(1, Math.round(ms / 1000))}s`;
        }

        function showCommunityToast(message) {
            const toast = document.getElementById('communityToast');
            const text = document.getElementById('communityToastText');
            if (!toast || !text) return;
            text.textContent = message;
            toast.style.display = 'inline-flex';
        }

        function hideCommunityToast() {
            const toast = document.getElementById('communityToast');
            if (!toast) return;
            toast.style.display = 'none';
        }

        function renderCommunityRefreshControls() {
            const toggleBtn = document.getElementById('communityRefreshToggle');
            const toggleText = document.getElementById('communityRefreshToggleText');
            const intervalText = document.getElementById('communityRefreshIntervalText');
            if (toggleBtn && toggleText) {
                toggleText.textContent = postsRefreshPaused ? 'Retomar auto-refresh' : 'Pausar auto-refresh';
                toggleBtn.classList.toggle('is-paused', postsRefreshPaused);
            }
            if (intervalText) {
                intervalText.textContent = refreshIntervalLabel(postsRefreshIntervalMs);
            }
        }

        function restartCommunityAutoRefresh() {
            if (postsRefreshTimer) {
                window.clearInterval(postsRefreshTimer);
                postsRefreshTimer = null;
            }

            if (postsRefreshPaused) return;

            postsRefreshTimer = window.setInterval(() => {
                silentRefreshPosts();
            }, postsRefreshIntervalMs);
        }

        function setCommunityRefreshPaused(paused) {
            postsRefreshPaused = Boolean(paused);
            try {
                localStorage.setItem(COMMUNITY_REFRESH_PAUSED_KEY, postsRefreshPaused ? '1' : '0');
            } catch {
                // ignora indisponibilidade de storage
            }
            renderCommunityRefreshControls();
            restartCommunityAutoRefresh();
        }

        function cycleCommunityRefreshInterval() {
            const currentIndex = COMMUNITY_AUTO_REFRESH_OPTIONS.indexOf(postsRefreshIntervalMs);
            const nextIndex = (currentIndex + 1) % COMMUNITY_AUTO_REFRESH_OPTIONS.length;
            postsRefreshIntervalMs = COMMUNITY_AUTO_REFRESH_OPTIONS[nextIndex];
            try {
                localStorage.setItem(COMMUNITY_REFRESH_INTERVAL_KEY, String(postsRefreshIntervalMs));
            } catch {
                // ignora indisponibilidade de storage
            }
            renderCommunityRefreshControls();
            restartCommunityAutoRefresh();
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text ?? '';
            return div.innerHTML;
        }

        function profileUrlByUserId(userId) {
            if (!userId) return '/me/profile';
            return `/users/${userId}`;
        }

        function resolveAvatar(avatar) {
            if (window.wfResolveAvatar) return window.wfResolveAvatar(avatar);
            return avatar || '';
        }

        function fmtDate(isoDate) {
            const date = new Date(isoDate);
            if (Number.isNaN(date.getTime())) return 'agora';
            return date.toLocaleString('pt-BR', {
                day: '2-digit',
                month: '2-digit',
                hour: '2-digit',
                minute: '2-digit',
            });
        }

        function requireAuth() {
            if (localStorage.getItem('token')) return true;
            window.location.href = '/login';
            return false;
        }

        function normalizePostText(text) {
            return (text || '').trim();
        }

        function updateFeedStatus(message = '') {
            const status = document.getElementById('communityFeedStatus');
            if (!status) return;
            status.textContent = message;
        }

        function saveCommunityScroll() {
            const current = Math.max(0, Math.floor(window.scrollY || 0));
            if (Math.abs(current - lastSavedScrollY) < 12) return;
            lastSavedScrollY = current;
            try {
                sessionStorage.setItem(COMMUNITY_SCROLL_KEY, String(current));
            } catch {
                // ignora indisponibilidade de storage
            }
        }

        function restoreCommunityScroll() {
            if (focusPostId) return;
            try {
                const value = Number(sessionStorage.getItem(COMMUNITY_SCROLL_KEY) || 0);
                if (value > 0) {
                    window.scrollTo({ top: value, behavior: 'auto' });
                }
            } catch {
                // ignora indisponibilidade de storage
            }
        }

        function animateFeedCards() {
            const cards = feed.querySelectorAll('.post-card.feed-enter');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('is-in');
                }, index * 22);
            });
        }

        function setCommunityTypingLock(active) {
            try {
                if (active) {
                    localStorage.setItem(GLOBAL_TYPING_LOCK_KEY, 'community');
                } else if (localStorage.getItem(GLOBAL_TYPING_LOCK_KEY) === 'community') {
                    localStorage.removeItem(GLOBAL_TYPING_LOCK_KEY);
                }
            } catch {
                // ignora indisponibilidade de storage
            }
        }

        function isCommunityTyping() {
            try {
                return localStorage.getItem(GLOBAL_TYPING_LOCK_KEY) === 'community';
            } catch {
                return false;
            }
        }

        function renderFeedLoading() {
            feed.innerHTML = `
                <div class="community-skeleton"></div>
                <div class="community-skeleton"></div>
                <div class="community-skeleton"></div>
            `;
        }

        async function fetchPostsPage(skip, limit = COMMUNITY_PAGE_SIZE) {
            if (postsFeedState.prefetch && postsFeedState.prefetch.skip === skip) {
                if (postsFeedState.prefetch.request) {
                    await postsFeedState.prefetch.request;
                }
                const payload = postsFeedState.prefetch.payload;
                postsFeedState.prefetch = null;
                return payload;
            }

            return apiRequest(`/community/posts?skip=${skip}&limit=${limit}`);
        }

        function prefetchNextPostsPage() {
            if (!postsFeedState.hasMore || postsFeedState.isLoading) return;
            const nextSkip = postsFeedState.skip;

            if (postsFeedState.prefetch && postsFeedState.prefetch.skip === nextSkip) {
                return;
            }

            const request = apiRequest(`/community/posts?skip=${nextSkip}&limit=${COMMUNITY_PAGE_SIZE}`)
                .then((payload) => {
                    postsFeedState.prefetch = { skip: nextSkip, payload };
                })
                .catch(() => {});

            postsFeedState.prefetch = {
                skip: nextSkip,
                payload: null,
                request,
            };
        }

        async function loadNextPostsPage() {
            if (postsFeedState.isLoading || !postsFeedState.hasMore) return;
            postsFeedState.isLoading = true;

            if (postsFeedState.skip === 0) {
                renderFeedLoading();
            } else {
                updateFeedStatus('Carregando mais posts...');
            }

            try {
                const data = await fetchPostsPage(postsFeedState.skip, COMMUNITY_PAGE_SIZE);
                const incoming = Array.isArray(data?.posts) ? data.posts : [];

                if (incoming.length) {
                    postsCache = postsCache.concat(incoming);
                    postsFeedState.skip += incoming.length;
                    postsFeedState.hasMore = incoming.length === COMMUNITY_PAGE_SIZE;
                } else {
                    postsFeedState.hasMore = false;
                }

                if (focusPostId && !postsCache.some((item) => Number(item.id) === Number(focusPostId))) {
                    try {
                        const targetPost = await apiRequest(`/community/posts/${focusPostId}`);
                        postsCache.unshift(targetPost);
                    } catch {
                        // ignora se post não existir
                    }
                }

                renderFeed(postsFeedState.skip > incoming.length);

                if (!postsFeedState.hasMore) {
                    updateFeedStatus(postsCache.length ? 'Você chegou ao fim dos posts.' : '');
                } else {
                    updateFeedStatus('Role para carregar mais.');
                    prefetchNextPostsPage();
                }
            } catch (error) {
                if (!postsCache.length) {
                    feed.innerHTML = `<div class="community-empty">Falha ao carregar a comunidade: ${escapeHtml(error.message || 'erro inesperado')}.</div>`;
                }
                updateFeedStatus('');
            } finally {
                postsFeedState.isLoading = false;
            }
        }

        function resetPostsFeed() {
            postsCache = [];
            postsFeedState.skip = 0;
            postsFeedState.hasMore = true;
            postsFeedState.isLoading = false;
            postsFeedState.prefetch = null;
            updateFeedStatus('');
        }

        function setupPostsInfiniteScroll() {
            const sentinel = document.getElementById('communityFeedSentinel');
            if (!sentinel) return;

            if (postsObserver) {
                postsObserver.disconnect();
            }

            postsObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (entry.isIntersecting) {
                        loadNextPostsPage();
                    }
                });
            }, {
                root: null,
                rootMargin: '260px 0px',
                threshold: 0,
            });

            postsObserver.observe(sentinel);
        }

        async function silentRefreshPosts() {
            if (postsRefreshPaused || isCommunityTyping() || postsFeedState.isLoading) return;

            try {
                const data = await apiRequest(`/community/posts?skip=0&limit=${Math.min(10, COMMUNITY_PAGE_SIZE)}`);
                const latest = Array.isArray(data?.posts) ? data.posts : [];
                if (!latest.length) return;

                const knownIds = new Set(postsCache.map((item) => String(item.id)));
                const fresh = latest.filter((item) => !knownIds.has(String(item.id)));
                if (!fresh.length) return;

                postsCache = fresh.concat(postsCache);
                postsFeedState.skip += fresh.length;
                renderFeed(true);
                updateFeedStatus(`${fresh.length} novo(s) post(s) recebidos.`);
                showCommunityToast(`${fresh.length} novo(s) post(s). Toque para ver.`);
            } catch {
                // falha silenciosa para nao interromper uso
            }
        }

        async function fetchComments(postId) {
            const comments = await apiRequest(`/community/posts/${postId}/comments?limit=100`);
            commentsCache.set(postId, Array.isArray(comments) ? comments : []);
        }

        function renderComments(postId) {
            const comments = commentsCache.get(postId) || [];
            const list = document.querySelector(`[data-comments-list="${postId}"]`);
            if (!list) return;

            if (!comments.length) {
                list.innerHTML = '<div class="post-comment-item"><p class="post-comment-content">Sem comentários ainda. Seja o primeiro a comentar.</p></div>';
                return;
            }

            list.innerHTML = comments.map((item) => `
                <article class="post-comment-item">
                    <div class="post-comment-meta"><a href="${escapeHtml(profileUrlByUserId(item.author?.id || 0))}" style="color:inherit;font-weight:900;text-decoration:none;" onclick="event.stopPropagation()">${escapeHtml(item.author?.name || 'Usuário')}</a> • ${escapeHtml(fmtDate(item.created_at))}</div>
                    <p class="post-comment-content">${escapeHtml(item.content || '')}</p>
                    ${isAdmin ? `
                        <div class="post-comment-actions">
                            <button class="comment-mod-btn" type="button" data-mod-hide-comment="${Number(item.id)}">Ocultar comentário</button>
                            <button class="comment-mod-btn" type="button" data-mod-remove-comment="${Number(item.id)}">Remover comentário</button>
                            <button class="comment-mod-btn" type="button" data-mod-block-user="${Number(item.author?.id || 0)}">Bloquear usuário</button>
                        </div>
                    ` : ''}
                </article>
            `).join('');

            if (isAdmin) {
                bindCommentModerationActions(postId);
            }
        }

        function scrollToFocusedPost() {
            if (!focusPostId) return;
            const element = document.querySelector(`[data-post-id="${focusPostId}"]`);
            if (!element) return;
            element.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }

        async function moderateHidePost(postId) {
            if (!isAdmin) return;
            if (!confirm('Ocultar este post da comunidade?')) return;
            try {
                await apiRequest(`/community/moderation/posts/${postId}/hide`, 'POST');
                postsCache = postsCache.filter((item) => Number(item.id) !== Number(postId));
                renderFeed();
            } catch (error) {
                alert(error.message || 'Falha ao ocultar post.');
            }
        }

        async function moderateRemovePost(postId) {
            if (!isAdmin) return;
            if (!confirm('Remover este post permanentemente?')) return;
            try {
                await apiRequest(`/community/moderation/posts/${postId}`, 'DELETE');
                postsCache = postsCache.filter((item) => Number(item.id) !== Number(postId));
                renderFeed();
            } catch (error) {
                alert(error.message || 'Falha ao remover post.');
            }
        }

        async function moderateBlockUser(userId) {
            if (!isAdmin || !userId) return;
            if (!confirm('Bloquear este usuário para interações na comunidade?')) return;
            try {
                await apiRequest(`/community/moderation/users/${userId}/block`, 'POST', { reason: 'Bloqueio aplicado por moderação' });
                alert('Usuário bloqueado para postar/comentar/curtir/compartilhar na comunidade.');
            } catch (error) {
                alert(error.message || 'Falha ao bloquear usuário.');
            }
        }

        function bindCommentModerationActions(postId) {
            document.querySelectorAll('[data-mod-hide-comment]').forEach((button) => {
                button.addEventListener('click', async () => {
                    const commentId = Number(button.getAttribute('data-mod-hide-comment'));
                    if (!confirm('Ocultar este comentário?')) return;
                    try {
                        await apiRequest(`/community/moderation/comments/${commentId}/hide`, 'POST');
                        commentsCache.delete(postId);
                        await fetchComments(postId);
                        renderComments(postId);

                        const post = postsCache.find((item) => Number(item.id) === Number(postId));
                        if (post) {
                            post.comments_count = Math.max(0, Number(post.comments_count || 0) - 1);
                            renderFeed();
                        }
                    } catch (error) {
                        alert(error.message || 'Falha ao ocultar comentário.');
                    }
                });
            });

            document.querySelectorAll('[data-mod-remove-comment]').forEach((button) => {
                button.addEventListener('click', async () => {
                    const commentId = Number(button.getAttribute('data-mod-remove-comment'));
                    if (!confirm('Remover este comentário permanentemente?')) return;
                    try {
                        await apiRequest(`/community/moderation/comments/${commentId}`, 'DELETE');
                        commentsCache.delete(postId);
                        await fetchComments(postId);
                        renderComments(postId);

                        const post = postsCache.find((item) => Number(item.id) === Number(postId));
                        if (post) {
                            post.comments_count = Math.max(0, Number(post.comments_count || 0) - 1);
                            renderFeed();
                        }
                    } catch (error) {
                        alert(error.message || 'Falha ao remover comentário.');
                    }
                });
            });

            document.querySelectorAll('[data-mod-block-user]').forEach((button) => {
                button.addEventListener('click', () => {
                    const userId = Number(button.getAttribute('data-mod-block-user'));
                    moderateBlockUser(userId);
                });
            });
        }

        async function submitComment(postId, inputEl) {
            if (!requireAuth()) return;

            const content = (inputEl?.value || '').trim();
            if (!content) return;

            try {
                const newComment = await apiRequest(`/community/posts/${postId}/comments`, 'POST', { content });
                const comments = commentsCache.get(postId) || [];
                comments.push(newComment);
                commentsCache.set(postId, comments);
                inputEl.value = '';
                renderComments(postId);

                const post = postsCache.find((item) => Number(item.id) === Number(postId));
                if (post) {
                    post.comments_count = Number(post.comments_count || 0) + 1;
                    renderFeed();
                }
            } catch (error) {
                alert(error.message || 'Não foi possível comentar agora.');
            }
        }

        async function toggleLike(postId) {
            if (!requireAuth()) return;

            try {
                const result = await apiRequest(`/community/posts/${postId}/like`, 'POST');
                const post = postsCache.find((item) => Number(item.id) === Number(postId));
                if (!post) return;

                post.liked_by_me = Boolean(result.liked);
                post.likes_count = Number(result.likes_count || 0);
                renderFeed();
            } catch (error) {
                alert(error.message || 'Não foi possível atualizar a curtida.');
            }
        }

        async function sharePost(postId) {
            if (!requireAuth()) return;

            try {
                const result = await apiRequest(`/community/posts/${postId}/share`, 'POST');
                const post = postsCache.find((item) => Number(item.id) === Number(postId));
                if (post) {
                    post.shares_count = Number(result.shares_count || 0);
                }

                const shareText = 'Veja este post na Comunidade Agro da WallFruits';
                const shareUrl = result.share_url || `${window.location.origin}/community`;

                if (navigator.share) {
                    await navigator.share({ title: 'Comunidade Agro', text: shareText, url: shareUrl });
                } else if (navigator.clipboard && navigator.clipboard.writeText) {
                    await navigator.clipboard.writeText(shareUrl);
                    alert('Link copiado para compartilhar.');
                } else {
                    alert(`Compartilhe este link: ${shareUrl}`);
                }

                renderFeed();
            } catch (error) {
                alert(error.message || 'Não foi possível compartilhar agora.');
            }
        }

        async function toggleComments(postId) {
            const wrapper = document.querySelector(`[data-comments-wrap="${postId}"]`);
            if (!wrapper) return;

            const willShow = !wrapper.classList.contains('visible');
            wrapper.classList.toggle('visible', willShow);

            if (!willShow) return;
            if (!commentsCache.has(postId)) {
                try {
                    await fetchComments(postId);
                } catch (error) {
                    commentsCache.set(postId, []);
                    alert(error.message || 'Não foi possível carregar comentários.');
                }
            }
            renderComments(postId);
        }

        function renderFeed(animate = false) {
            const posts = postsCache;

            if (!posts.length) {
                feed.innerHTML = '<div class="community-empty">Ainda não há publicações. Seja o primeiro a compartilhar uma atualização.</div>';
                return;
            }

            feed.innerHTML = posts.map((post) => {
                const isLiked = Boolean(post.liked_by_me);
                return `
                    <article class="post-card ${focusPostId && Number(post.id) === Number(focusPostId) ? 'post-focus' : ''} ${animate ? 'feed-enter' : ''}" data-post-id="${escapeHtml(post.id)}">
                        <div class="post-main">
                            <a class="post-avatar-link" href="${escapeHtml(profileUrlByUserId(post.author?.id || 0))}" onclick="event.stopPropagation()">
                                <img class="post-avatar" src="${escapeHtml(resolveAvatar(post.author?.profile_image))}" alt="Avatar de ${escapeHtml(post.author?.name || 'Usuário')}" onerror="wfAvatarOnError(this)">
                            </a>

                            <div>
                                <div class="post-head">
                                    <a class="post-user-link" href="${escapeHtml(profileUrlByUserId(post.author?.id || 0))}" onclick="event.stopPropagation()"><span class="post-user">${escapeHtml(post.author?.name || 'Produtor Rural')}</span></a>
                                    <span class="post-badge">${escapeHtml(post.author?.role || 'Membro')}</span>
                                    <span class="post-date">${escapeHtml(fmtDate(post.created_at))}</span>
                                </div>

                                <p class="post-text">${escapeHtml(post.content || '')}</p>

                                ${post.image_url ? `
                                    <div class="post-image-wrap">
                                        <img class="post-image" src="${escapeHtml(post.image_url)}" alt="Imagem publicada na comunidade" data-open-img="${escapeHtml(post.id)}">
                                    </div>
                                ` : ''}

                                <div class="post-actions">
                                    <button class="post-action-btn ${isLiked ? 'liked' : ''}" type="button" data-like-post="${escapeHtml(post.id)}">
                                        <span class="material-icons">${isLiked ? 'favorite' : 'favorite_border'}</span>
                                        <span>${Number(post.likes_count || 0)}</span>
                                    </button>
                                    <button class="post-action-btn" type="button" data-toggle-comments="${escapeHtml(post.id)}">
                                        <span class="material-icons">chat_bubble_outline</span>
                                        <span>${Number(post.comments_count || 0)}</span>
                                    </button>
                                    <button class="post-action-btn" type="button" data-share-post="${escapeHtml(post.id)}">
                                        <span class="material-icons">share</span>
                                        <span>${Number(post.shares_count || 0)}</span>
                                    </button>
                                    ${isAdmin ? `
                                        <button class="post-action-btn moderation" type="button" data-mod-hide-post="${escapeHtml(post.id)}">
                                            <span class="material-icons">visibility_off</span>
                                            <span>Ocultar</span>
                                        </button>
                                        <button class="post-action-btn moderation" type="button" data-mod-remove-post="${escapeHtml(post.id)}">
                                            <span class="material-icons">delete</span>
                                            <span>Remover</span>
                                        </button>
                                        <button class="post-action-btn moderation" type="button" data-mod-block-post-user="${escapeHtml(post.author?.id || 0)}">
                                            <span class="material-icons">block</span>
                                            <span>Bloquear</span>
                                        </button>
                                    ` : ''}
                                </div>

                                <div class="post-comments" data-comments-wrap="${escapeHtml(post.id)}">
                                    <div class="post-comments-list" data-comments-list="${escapeHtml(post.id)}"></div>
                                    <div class="post-comment-form">
                                        <input class="post-comment-input" data-comment-input="${escapeHtml(post.id)}" type="text" maxlength="1200" placeholder="Comente algo...">
                                        <button class="post-comment-send" data-comment-send="${escapeHtml(post.id)}" type="button">Comentar</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </article>
                `;
            }).join('');

            bindPostActions();

            if (animate) {
                requestAnimationFrame(animateFeedCards);
            }
        }

        function bindPostActions() {
            document.querySelectorAll('[data-like-post]').forEach((button) => {
                button.addEventListener('click', () => {
                    const postId = Number(button.getAttribute('data-like-post'));
                    toggleLike(postId);
                });
            });

            document.querySelectorAll('[data-share-post]').forEach((button) => {
                button.addEventListener('click', () => {
                    const postId = Number(button.getAttribute('data-share-post'));
                    sharePost(postId);
                });
            });

            document.querySelectorAll('[data-mod-hide-post]').forEach((button) => {
                button.addEventListener('click', () => {
                    const postId = Number(button.getAttribute('data-mod-hide-post'));
                    moderateHidePost(postId);
                });
            });

            document.querySelectorAll('[data-mod-remove-post]').forEach((button) => {
                button.addEventListener('click', () => {
                    const postId = Number(button.getAttribute('data-mod-remove-post'));
                    moderateRemovePost(postId);
                });
            });

            document.querySelectorAll('[data-mod-block-post-user]').forEach((button) => {
                button.addEventListener('click', () => {
                    const userId = Number(button.getAttribute('data-mod-block-post-user'));
                    moderateBlockUser(userId);
                });
            });

            document.querySelectorAll('[data-toggle-comments]').forEach((button) => {
                button.addEventListener('click', () => {
                    const postId = Number(button.getAttribute('data-toggle-comments'));
                    toggleComments(postId);
                });
            });

            document.querySelectorAll('[data-comment-send]').forEach((button) => {
                button.addEventListener('click', () => {
                    const postId = Number(button.getAttribute('data-comment-send'));
                    const inputEl = document.querySelector(`[data-comment-input="${postId}"]`);
                    submitComment(postId, inputEl);
                });
            });

            document.querySelectorAll('[data-comment-input]').forEach((inputEl) => {
                inputEl.addEventListener('keydown', (event) => {
                    if (event.key !== 'Enter') return;
                    event.preventDefault();
                    const postId = Number(inputEl.getAttribute('data-comment-input'));
                    submitComment(postId, inputEl);
                });
            });

            document.querySelectorAll('[data-open-img]').forEach((img) => {
                img.addEventListener('click', () => {
                    const postId = Number(img.getAttribute('data-open-img'));
                    const post = postsCache.find((item) => Number(item.id) === postId);
                    if (!post || !post.image_url) return;
                    modalImg.src = post.image_url;
                    modal.style.display = 'flex';
                });
            });
        }

        function updatePreview(file, imageDataUrl) {
            if (!file || !imageDataUrl) {
                previewWrap.style.display = 'none';
                previewImg.src = '';
                previewText.textContent = '';
                return;
            }

            previewWrap.style.display = 'flex';
            previewImg.src = imageDataUrl;
            previewText.textContent = `Imagem selecionada: ${file.name}`;
        }

        imageInput.addEventListener('change', () => {
            const file = imageInput.files?.[0];
            if (!file) {
                pendingImage = null;
                updatePreview(null, null);
                return;
            }

            const reader = new FileReader();
            reader.onload = (event) => {
                pendingImage = event.target?.result || null;
                updatePreview(file, pendingImage);
            };
            reader.readAsDataURL(file);
        });

        sendBtn.addEventListener('click', async () => {
            if (!requireAuth()) return;

            const text = normalizePostText(postInput.value || '');
            if (!text && !pendingImage) return;

            try {
                await apiRequest('/community/posts', 'POST', {
                    content: text,
                    image_url: pendingImage,
                });

                postInput.value = '';
                imageInput.value = '';
                pendingImage = null;
                updatePreview(null, null);

                resetPostsFeed();
                await loadNextPostsPage();
            } catch (error) {
                alert(error.message || 'Não foi possível publicar agora.');
            }
        });

        postInput.addEventListener('keydown', (event) => {
            if ((event.ctrlKey || event.metaKey) && event.key === 'Enter') {
                sendBtn.click();
            }
        });

        postInput.addEventListener('focus', () => setCommunityTypingLock(true));
        postInput.addEventListener('blur', () => setTimeout(() => setCommunityTypingLock(false), 120));
        postInput.addEventListener('input', () => setCommunityTypingLock(true));

        feed.addEventListener('focusin', (event) => {
            if (event.target && event.target.classList && event.target.classList.contains('post-comment-input')) {
                setCommunityTypingLock(true);
            }
        });

        feed.addEventListener('focusout', (event) => {
            if (event.target && event.target.classList && event.target.classList.contains('post-comment-input')) {
                setTimeout(() => setCommunityTypingLock(false), 120);
            }
        });

        modal.addEventListener('click', () => {
            modal.style.display = 'none';
            modalImg.src = '';
        });

        const communityToast = document.getElementById('communityToast');
        if (communityToast) {
            communityToast.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
                hideCommunityToast();
            });
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                modal.style.display = 'none';
                modalImg.src = '';
            }
        });

        window.addEventListener('scroll', saveCommunityScroll, { passive: true });
        window.addEventListener('scroll', () => {
            if ((window.scrollY || 0) < 40) {
                hideCommunityToast();
            }
        }, { passive: true });

        try {
            const savedPaused = localStorage.getItem(COMMUNITY_REFRESH_PAUSED_KEY);
            postsRefreshPaused = savedPaused === '1';

            const savedInterval = Number(localStorage.getItem(COMMUNITY_REFRESH_INTERVAL_KEY) || COMMUNITY_AUTO_REFRESH_DEFAULT_MS);
            if (COMMUNITY_AUTO_REFRESH_OPTIONS.includes(savedInterval)) {
                postsRefreshIntervalMs = savedInterval;
            }
        } catch {
            // ignora indisponibilidade de storage
        }

        const refreshToggleBtn = document.getElementById('communityRefreshToggle');
        const refreshIntervalBtn = document.getElementById('communityRefreshInterval');
        if (refreshToggleBtn) {
            refreshToggleBtn.addEventListener('click', () => {
                setCommunityRefreshPaused(!postsRefreshPaused);
            });
        }
        if (refreshIntervalBtn) {
            refreshIntervalBtn.addEventListener('click', cycleCommunityRefreshInterval);
        }

        renderCommunityRefreshControls();

        setupPostsInfiniteScroll();
        loadNextPostsPage().then(() => {
            if (focusPostId) {
                setTimeout(scrollToFocusedPost, 120);
            } else {
                setTimeout(restoreCommunityScroll, 60);
            }
        });

        restartCommunityAutoRefresh();

        window.addEventListener('beforeunload', () => {
            if (postsRefreshTimer) {
                window.clearInterval(postsRefreshTimer);
            }
            setCommunityTypingLock(false);
        });
    })();
</script>
{% endblock %}
