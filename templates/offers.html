{% extends "base.html" %}

{% block title %}Ofertas - WallFruits{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<style>
    .offers-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 0.8rem;
    }

    .offers-header h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin: 0;
    }

    .offers-count {
        color: var(--wf-text-secondary);
        font-size: 0.85rem;
        margin-top: 0.2rem;
    }

    .offers-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.88rem;
    }

    .offers-filters {
        display: grid;
        grid-template-columns: 1.5fr 1fr 1fr 1fr 1fr auto;
        gap: 0.55rem;
        margin-bottom: 0.9rem;
    }

    .offers-store-featured {
        border: 1px solid var(--wf-border);
        border-radius: 10px;
        background: rgba(255,255,255,0.03);
        padding: 0.62rem;
        margin-bottom: 0.95rem;
    }

    .offers-store-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.45rem;
        flex-wrap: wrap;
    }

    .offers-store-title {
        margin: 0;
        font-size: 0.88rem;
        font-weight: 800;
        letter-spacing: -0.02em;
    }

    .offers-store-row {
        display: flex;
        gap: 0.62rem;
        overflow-x: auto;
        padding-bottom: 0.2rem;
    }

    .offers-store-card {
        min-width: 192px;
        max-width: 192px;
        border: 1px solid rgba(255,255,255,0.16);
        border-radius: 9px;
        background: rgba(255,255,255,0.05);
        overflow: hidden;
        text-decoration: none;
        color: inherit;
    }

    .offers-store-media {
        height: 90px;
        background: rgba(255,255,255,0.04);
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .offers-store-media img {
        max-width: 92%;
        max-height: 92%;
        object-fit: contain;
    }

    .offers-store-body {
        padding: 0.5rem;
        display: grid;
        gap: 0.2rem;
    }

    .offers-store-cat {
        font-size: 0.62rem;
        color: var(--wf-text-secondary);
        text-transform: uppercase;
        font-weight: 700;
    }

    .offers-store-name {
        margin: 0;
        font-size: 0.72rem;
        font-weight: 800;
        color: #ffe0b4;
        min-height: 1.7rem;
    }

    .offers-store-price {
        font-size: 0.72rem;
        font-weight: 800;
    }

    .offers-search-wrap {
        position: relative;
    }

    .offers-search-wrap .material-symbols-outlined {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: var(--wf-text-secondary);
    }

    .offers-search-input {
        padding-left: 2rem !important;
    }

    .produto-card {
        display: flex;
        min-height: 186px;
        border-radius: 12px;
        border: 1px solid rgba(27, 69, 118, 0.16);
        background: linear-gradient(140deg, #fffdf6 0%, #f6fbff 58%, #eef7f0 100%);
        box-shadow: 0 10px 22px rgba(21, 49, 88, 0.1);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .produto-card:hover {
        transform: translateY(-2px);
        border-color: rgba(46, 125, 50, 0.35);
        box-shadow: 0 14px 26px rgba(22, 74, 40, 0.16);
    }

    .produto-img-wrap {
        width: 64px;
        min-width: 64px;
        min-height: 186px;
        border-right: 1px solid rgba(27, 69, 118, 0.14);
        background: linear-gradient(180deg, rgba(237, 247, 255, 0.9), rgba(238, 248, 240, 0.8));
    }

    .produto-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .produto-content {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
        padding: 0.8rem;
    }

    .produtor-box {
        display: flex;
        align-items: center;
        gap: 0.55rem;
    }

    .produtor-avatar {
        width: 25px;
        height: 25px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(21, 68, 128, 0.16);
        background: rgba(206, 227, 247, 0.58);
    }

    .produtor-avatar-fallback {
        width: 25px;
        height: 25px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.64rem;
        font-weight: 700;
        color: #103463;
        background: #dbeafe;
    }

    .produtor-info {
        line-height: 1.15;
    }

    .produtor-nome {
        font-size: 0.8rem;
        font-weight: 700;
        color: #123b72;
    }

    .produtor-username {
        font-size: 0.7rem;
        color: #4f6f96;
    }

    .fruta-nome {
        font-size: 0.98rem;
        font-weight: 800;
        color: #1e4d8a;
        letter-spacing: -0.3px;
        margin: 0.35rem 0 0.45rem;
    }

    .price-box {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.35rem;
        background: linear-gradient(135deg, rgba(243, 250, 255, 0.95), rgba(232, 247, 238, 0.96));
        border: 1px solid rgba(38, 119, 64, 0.24);
        border-radius: 10px;
        padding: 0.45rem;
        margin-bottom: 0.45rem;
    }

    .price-col {
        text-align: center;
        border-right: 1px dashed rgba(17, 73, 125, 0.14);
    }

    .price-col:last-child {
        border-right: none;
    }

    .price-label {
        display: block;
        font-size: 0.62rem;
        text-transform: uppercase;
        color: #4e6c92;
        letter-spacing: 0.3px;
        margin-bottom: 2px;
    }

    .price-val {
        font-size: 0.82rem;
        font-weight: 700;
        color: #18497f;
    }

    .mini-meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.35rem;
    }

    .mini-meta-card {
        border-radius: 8px;
        border: 1px solid rgba(17, 73, 125, 0.16);
        background: linear-gradient(135deg, rgba(247, 252, 255, 0.95), rgba(240, 250, 244, 0.92));
        padding: 0.3rem 0.35rem;
        min-height: 42px;
    }

    .mini-meta-top {
        display: flex;
        align-items: center;
        gap: 3px;
        color: #4f6c93;
        font-size: 0.6rem;
        margin-bottom: 1px;
    }

    .mini-meta-val {
        font-size: 0.69rem;
        color: #173f73;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .material-symbols-outlined {
        font-size: 15px;
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
    }

    .product-actions {
        display: flex;
        gap: 0.35rem;
        margin-top: 0.5rem;
    }

    .action-primary,
    .action-secondary,
    .action-side {
        border: 1px solid rgba(17, 73, 125, 0.16);
        border-radius: 999px;
        background: rgba(247, 253, 255, 0.9);
        color: #194a82;
        transition: all 0.2s ease;
    }

    .action-primary,
    .action-secondary {
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.35rem 0.72rem;
    }

    .action-primary {
        background: linear-gradient(135deg, #2f855a, #3f9c67);
        border-color: rgba(37, 116, 71, 0.5);
        color: #f6fff8;
    }

    .action-secondary {
        background: linear-gradient(135deg, #e7f3ff, #dff0ff);
        border-color: rgba(24, 89, 155, 0.3);
        color: #1c4f86;
    }

    .action-secondary:hover,
    .action-primary:hover,
    .action-side:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.3);
    }

    .card-side {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        gap: 0.45rem;
    }

    .action-side {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
    }

    .action-side.active-like {
        color: #ff9cb0;
        border-color: rgba(255, 156, 176, 0.42);
        background: rgba(255, 156, 176, 0.2);
    }

    .action-side.active-bookmark {
        color: #8fe6ff;
        border-color: rgba(143, 230, 255, 0.42);
        background: rgba(143, 230, 255, 0.2);
    }

    .open-tip {
        font-size: 0.62rem;
        color: #4f6f96;
        text-align: center;
        line-height: 1.2;
        max-width: 34px;
    }

    .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        border: 1px dashed var(--wf-border);
        border-radius: 12px;
        color: var(--wf-text-secondary);
    }

        .messages-float-btn {
            position: fixed;
            right: 22px;
            bottom: 22px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--wf-accent);
            color: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.45);
            z-index: 1300;
        }

        .messages-float-btn .material-symbols-outlined {
            font-size: 27px;
        }

        .messages-float-count {
            position: absolute;
            top: -4px;
            right: -2px;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            background: #ff4d6a;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            border: 2px solid #0a0a0f;
        }

    .skeleton-card {
        min-height: 186px;
        border-radius: 8px;
        border: 1px solid var(--wf-border);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 20%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 80%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    @media (max-width: 1024px) {
        .offers-list {
            grid-template-columns: 1fr;
        }

        .produto-card {
            min-height: 202px;
        }

        .produto-img-wrap {
            min-height: 202px;
        }
    }

    @media (max-width: 840px) {
        .offers-header h1 {
            font-size: 1.5rem;
        }

        .produto-content {
            grid-template-columns: 1fr;
        }

        .offers-filters {
            grid-template-columns: 1fr 1fr;
        }

        .card-side {
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            margin-top: 0.35rem;
        }

        .open-tip {
            max-width: none;
            text-align: left;
        }
    }

    @media (max-width: 640px) {
        .produto-card {
            min-height: 196px;
        }

        .produto-img-wrap {
            min-height: 196px;
        }

        .mini-meta-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .offers-filters {
            grid-template-columns: 1fr;
        }
    }
</style>

<a href="/messages" class="messages-float-btn" title="Minhas mensagens">
    <span class="material-symbols-outlined">chat</span>
    <span id="messagesFloatCount" class="messages-float-count" style="display:none;">0</span>
</a>

<div class="offers-header">
    <div>
        <h1>Ofertas <span class="wf-gradient-text">Disponíveis</span></h1>
        <div class="offers-count" id="offersCount"></div>
    </div>
    <a href="/offers/new" class="btn btn-wf-secondary">+ Criar oferta</a>
</div>

<div class="offers-filters">
    <div class="offers-search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input id="filterSearch" class="wf-input form-control offers-search-input" type="text" placeholder="Buscar ofertas, produtor ou localização">
    </div>
    <input id="filterCategory" class="wf-input form-control" type="text" placeholder="Categoria">
    <input id="filterLocation" class="wf-input form-control" type="text" placeholder="Localização">
    <input id="filterMinPrice" class="wf-input form-control" type="number" min="0" step="0.01" placeholder="Preço mín">
    <input id="filterMaxPrice" class="wf-input form-control" type="number" min="0" step="0.01" placeholder="Preço máx">
    <button class="btn btn-wf-secondary" type="button" onclick="applyFilters()">Filtrar</button>
</div>

<section class="offers-store-featured" aria-label="Produtos em destaque da loja">
    <div class="offers-store-head">
        <h2 class="offers-store-title">Anúncios de produtos em destaque</h2>
        <a href="/store" class="btn btn-wf-secondary" style="padding:0.34rem 0.75rem;font-size:0.73rem;">Ver loja</a>
    </div>
    <div id="offersFeaturedStore" class="offers-store-row"></div>
</section>

<div class="offers-list wf-stagger" id="offersContainer">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
</div>

<script>
    const offersStore = new Map();
    const BOOKMARK_STORAGE_KEY = 'wf_offer_bookmarks';

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text ?? '';
        return div.innerHTML;
    }

    function toCurrency(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return 'R$ -';
        }
        return `R$ ${Number(value).toFixed(2)}`;
    }

    function fallbackImageSvg(label) {
        const safeLabel = encodeURIComponent((label || 'Fruta').slice(0, 16));
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='700'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%231a1a23'/><stop offset='100%' stop-color='%23262835'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)'/><circle cx='200' cy='260' r='90' fill='%23EDA44C' opacity='0.25'/><text x='50%' y='80%' dominant-baseline='middle' text-anchor='middle' fill='%23e8e8ed' font-size='30' font-family='Arial'>${safeLabel}</text></svg>`;
        return `data:image/svg+xml;utf8,${svg}`;
    }

    function getOfferImage(offer) {
        if (Array.isArray(offer.images) && offer.images.length > 0 && offer.images[0]) {
            return offer.images[0];
        }
        return fallbackImageSvg(offer.product_name);
    }

    function getStoreProductImage(product) {
        return product.image || fallbackImageSvg(product.name || 'Produto');
    }

    function getOwnerUsername(offer) {
        const email = offer.owner_data?.email || '';
        if (email.includes('@')) {
            return '@' + email.split('@')[0];
        }
        const ownerId = offer.owner_data?.id || offer.user_id;
        return `@produtor${ownerId}`;
    }

    function getOwnerAvatar(offer) {
        if (offer.owner_data?.profile_image) {
            const image = offer.owner_data.profile_image;
            const src = image.startsWith('http://') || image.startsWith('https://') || image.startsWith('/')
                ? image
                : `/api/uploads/profiles/${image}`;
            return `<img class="produtor-avatar" src="${escapeHtml(src)}" alt="Avatar do produtor">`;
        }

        const name = offer.owner_data?.name || 'Produtor';
        const initials = name
            .split(' ')
            .filter(Boolean)
            .slice(0, 2)
            .map((p) => p[0].toUpperCase())
            .join('');

        return `<span class="produtor-avatar-fallback">${escapeHtml(initials || 'PR')}</span>`;
    }

    function ownerProfileUrl(offer) {
        const ownerId = offer.owner_data?.id || offer.user_id;
        return `/users/${ownerId}`;
    }

    function getBookmarks() {
        try {
            return JSON.parse(localStorage.getItem(BOOKMARK_STORAGE_KEY) || '[]');
        } catch {
            return [];
        }
    }

    function isBookmarked(offerId) {
        return getBookmarks().includes(offerId);
    }

    function setBookmarked(offerId, enabled) {
        const set = new Set(getBookmarks());
        if (enabled) {
            set.add(offerId);
        } else {
            set.delete(offerId);
        }
        localStorage.setItem(BOOKMARK_STORAGE_KEY, JSON.stringify(Array.from(set)));
    }

    function cardMetaItems(offer) {
        const quantity = offer.available_quantity || offer.quantity || '-';
        const market = offer.target_market || offer.origin || '-';

        return [
            { icon: 'balance', label: 'Quantidade', value: `${quantity} ${offer.unit || 'kg'}` },
            { icon: 'wifi', label: 'Disponivel', value: offer.status || '-' },
            { icon: 'list', label: 'Qualidade', value: offer.quality_class || offer.quality_grade || '-' },
            { icon: 'workspace_premium', label: 'Certificacao', value: offer.certification || '-' },
            { icon: 'timer', label: 'Duracao', value: offer.ad_duration_days ? `${offer.ad_duration_days} dias` : (offer.shelf_life ? `${offer.shelf_life} dias` : '-') },
            { icon: 'storefront', label: 'Mercado', value: market },
        ];
    }

    function renderOfferCard(offer) {
        const min = offer.price_min_kg ?? offer.price_per_kg ?? offer.price;
        const perKg = offer.price_per_kg ?? offer.price_avg_kg ?? offer.price;
        const max = offer.price_max_kg ?? offer.price_per_kg ?? offer.price;

        const metaCards = cardMetaItems(offer).map((item) => `
            <div class="mini-meta-card">
                <div class="mini-meta-top">
                    <span class="material-symbols-outlined">${item.icon}</span>
                    <span>${escapeHtml(item.label)}</span>
                </div>
                <div class="mini-meta-val" title="${escapeHtml(String(item.value))}">${escapeHtml(String(item.value))}</div>
            </div>
        `).join('');

        const bookmarked = isBookmarked(offer.id);

        return `
            <article class="produto-card" data-offer-id="${offer.id}">
                <div class="produto-img-wrap">
                    <img class="produto-img" src="${escapeHtml(getOfferImage(offer))}" alt="Imagem de ${escapeHtml(offer.product_name)}">
                </div>

                <div class="produto-content">
                    <div>
                        <div class="produtor-box">
                            <a href="${ownerProfileUrl(offer)}" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:0.65rem;text-decoration:none;color:inherit;">
                                ${getOwnerAvatar(offer)}
                                <div class="produtor-info">
                                    <div class="produtor-nome">${escapeHtml(offer.owner_data?.name || 'Produtor')}</div>
                                    <div class="produtor-username">${escapeHtml(getOwnerUsername(offer))}</div>
                                </div>
                            </a>
                        </div>

                        <h3 class="fruta-nome">${escapeHtml(offer.product_name)}</h3>

                        <div class="price-box">
                            <div class="price-col">
                                <span class="price-label">Preco min</span>
                                <span class="price-val">${toCurrency(min)}</span>
                            </div>
                            <div class="price-col">
                                <span class="price-label">Preco/kg</span>
                                <span class="price-val">${toCurrency(perKg)}</span>
                            </div>
                            <div class="price-col">
                                <span class="price-label">Preco max</span>
                                <span class="price-val">${toCurrency(max)}</span>
                            </div>
                        </div>

                        <div class="mini-meta-grid">${metaCards}</div>

                        <div class="product-actions">
                            <button class="action-primary" onclick="notifyProducer('${offer.id}', event)">Avisar</button>
                            <button class="action-secondary" onclick="reserveOffer('${offer.id}', event)">Reservar</button>
                        </div>
                    </div>

                    <div class="card-side">
                        <button class="action-side ${offer.is_favorited ? 'active-like' : ''}" title="Curtir" onclick="toggleLike('${offer.id}', event)">
                            <span class="material-symbols-outlined">favorite</span>
                        </button>
                        <button class="action-side ${bookmarked ? 'active-bookmark' : ''}" title="Bookmark" onclick="toggleBookmark('${offer.id}', event)">
                            <span class="material-symbols-outlined">bookmark</span>
                        </button>
                        <button class="action-side" title="Chat" onclick="openChat('${offer.id}', event)">
                            <span class="material-symbols-outlined">chat</span>
                        </button>
                        <div class="open-tip">abrir detalhes</div>
                    </div>
                </div>
            </article>
        `;
    }

    async function notifyProducer(offerId, event) {
        event.stopPropagation();

        const offer = offersStore.get(offerId);
        const receiverId = offer?.owner_data?.id;

        if (!receiverId) {
            alert('Nao foi possivel identificar o produtor.');
            return;
        }

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        window.location.href = `/messages?user_id=${receiverId}&offer_id=${offer.id}`;
    }

    async function reserveOffer(offerId, event) {
        event.stopPropagation();

        const offer = offersStore.get(offerId);
        if (!offer) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        const defaultQty = Number(offer.min_order || 1);
        const rawQty = prompt(`Quantidade para reservar (${offer.unit || 'kg'}):`, String(defaultQty));
        if (rawQty === null) return;

        const qty = Number(rawQty);
        if (!qty || qty <= 0) {
            alert('Quantidade invalida.');
            return;
        }

        try {
            await apiRequest('/transactions', 'POST', {
                offer_id: offer.id,
                quantity: qty,
                delivery_method: 'pickup',
                payment_method: 'transfer',
            });
            alert('Reserva registrada com sucesso. Acompanhe em Meus pedidos.');
            window.location.href = '/orders';
        } catch (error) {
            alert(error.message || 'Nao foi possivel reservar agora.');
        }
    }

    async function toggleLike(offerId, event) {
        event.stopPropagation();

        const offer = offersStore.get(offerId);
        if (!offer) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        try {
            if (offer.is_favorited) {
                await apiRequest(`/favorites/${offer.id}`, 'DELETE');
                offer.is_favorited = false;
            } else {
                await apiRequest('/favorites', 'POST', { offer_id: offer.id });
                offer.is_favorited = true;
            }

            const button = event.currentTarget;
            button.classList.toggle('active-like', offer.is_favorited);
        } catch (error) {
            alert(error.message || 'Falha ao atualizar favorito.');
        }
    }

    function toggleBookmark(offerId, event) {
        event.stopPropagation();

        const shouldEnable = !isBookmarked(offerId);
        setBookmarked(offerId, shouldEnable);
        event.currentTarget.classList.toggle('active-bookmark', shouldEnable);
    }

    function openChat(offerId, event) {
        event.stopPropagation();
        const offer = offersStore.get(offerId);
        if (!offer) return;

        if (!offer.owner_data?.id) {
            alert('Nao foi possivel identificar o produtor para chat.');
            return;
        }

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        window.location.href = `/messages?user_id=${offer.owner_data.id}&offer_id=${offer.id}`;
    }

    async function loadMessagesBadge() {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const me = await apiRequest('/auth/me');
            const count = Number(me?.unread_messages || 0);
            const badge = document.getElementById('messagesFloatCount');
            badge.textContent = String(count);
            badge.style.display = count > 0 ? 'inline-block' : 'none';
        } catch {
            // ignora falhas do badge de mensagens
        }
    }

    function bindCardOpenBehavior() {
        document.querySelectorAll('.produto-card').forEach((card) => {
            card.addEventListener('click', (event) => {
                const interactive = event.target.closest('button');
                if (interactive) return;

                const offerId = card.dataset.offerId;
                if (!offerId) return;

                window.location.href = `/offers/${offerId}`;
            });
        });
    }

    function buildOffersQuery() {
        const search = document.getElementById('filterSearch').value.trim();
        const category = document.getElementById('filterCategory').value.trim();
        const location = document.getElementById('filterLocation').value.trim();
        const minPrice = document.getElementById('filterMinPrice').value;
        const maxPrice = document.getElementById('filterMaxPrice').value;

        const params = new URLSearchParams();
        params.set('limit', '12');
        if (search) params.set('search', search);
        if (category) params.set('category', category);
        if (location) params.set('location', location);
        if (minPrice) params.set('min_price', minPrice);
        if (maxPrice) params.set('max_price', maxPrice);

        return `/offers?${params.toString()}`;
    }

    async function loadOffers() {
        const container = document.getElementById('offersContainer');
        try {
            const data = await apiRequest(buildOffersQuery());
            const offers = data.offers || [];

            document.getElementById('offersCount').textContent = `${offers.length} oferta${offers.length === 1 ? '' : 's'} encontrada${offers.length === 1 ? '' : 's'}`;

            if (!offers.length) {
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Nenhuma oferta cadastrada ainda.</p>
                        <a href="/offers/new" class="btn btn-wf-primary">Criar primeira oferta</a>
                    </div>
                `;
                return;
            }

            offers.forEach((offer) => offersStore.set(offer.id, offer));
            container.innerHTML = offers.map(renderOfferCard).join('');
            bindCardOpenBehavior();
        } catch (error) {
            container.innerHTML = `<div class="wf-alert wf-alert-error">${escapeHtml(error.message || 'Falha ao carregar ofertas')}</div>`;
        }
    }

    async function loadFeaturedStoreProducts() {
        const container = document.getElementById('offersFeaturedStore');
        if (!container) return;

        try {
            const resp = await fetch('/api/store/featured?limit=6');
            const data = await resp.json();
            const products = Array.isArray(data?.products) ? data.products : [];

            if (!products.length) {
                container.innerHTML = '<div class="wf-alert wf-alert-info" style="min-width:100%;">Sem produtos em destaque no momento.</div>';
                return;
            }

            container.innerHTML = products.map((product) => `
                <a href="/store/product/${encodeURIComponent(product.slug)}" class="offers-store-card">
                    <div class="offers-store-media">
                        <img src="${escapeHtml(getStoreProductImage(product))}" alt="${escapeHtml(product.name || 'Produto')}" loading="lazy">
                    </div>
                    <div class="offers-store-body">
                        <span class="offers-store-cat">${escapeHtml(product.category || 'Categoria')}</span>
                        <h3 class="offers-store-name">${escapeHtml(product.name || 'Produto')}</h3>
                        <span class="offers-store-price">R$ ${Number(product.price || 0).toFixed(2)}</span>
                    </div>
                </a>
            `).join('');
        } catch {
            container.innerHTML = '<div class="wf-alert wf-alert-error" style="min-width:100%;">Falha ao carregar anúncios da loja.</div>';
        }
    }

    function applyFilters() {
        loadOffers();
    }

    ['filterSearch', 'filterCategory', 'filterLocation', 'filterMinPrice', 'filterMaxPrice'].forEach((id) => {
        const el = document.getElementById(id);
        el.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                loadOffers();
            }
        });
    });

    loadOffers();
    loadFeaturedStoreProducts();
    loadMessagesBadge();
</script>
{% endblock %}
