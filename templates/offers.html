{% extends "base.html" %}

{% block title %}Ofertas - WallFruits{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<style>
    .offers-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 1.5rem;
        flex-wrap: wrap;
        gap: 0.8rem;
    }

    .offers-header h1 {
        font-size: 2rem;
        font-weight: 800;
        letter-spacing: -1px;
        margin: 0;
    }

    .offers-count {
        color: var(--wf-text-secondary);
        font-size: 0.85rem;
        margin-top: 0.2rem;
    }

    .offers-live-controls {
        margin-top: 0.55rem;
        display: inline-flex;
        gap: 0.42rem;
        flex-wrap: wrap;
    }

    .offers-live-btn {
        border: 1px solid rgba(0, 212, 170, 0.24);
        border-radius: 999px;
        background: rgba(0, 212, 170, 0.08);
        color: #d8fff6;
        padding: 0.34rem 0.66rem;
        font-size: 0.72rem;
        font-weight: 800;
        display: inline-flex;
        align-items: center;
        gap: 0.28rem;
        cursor: pointer;
    }

    .offers-live-btn.is-paused {
        border-color: rgba(252, 90, 90, 0.3);
        color: #ff9f9f;
        background: rgba(214, 51, 51, 0.12);
    }

    .offers-list {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 0.88rem;
    }

    .offers-filters {
        display: grid;
        grid-template-columns: 1fr 1fr 1fr 1fr auto;
        gap: 0.55rem;
        margin-bottom: 0.9rem;
    }

    .offers-search-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.5rem;
        margin-bottom: 0.65rem;
    }

    .offers-fruit-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.7rem;
        align-items: center;
    }

    .offers-fruit-chip {
        border: 1px solid rgba(17, 73, 125, 0.2);
        border-radius: 999px;
        background: linear-gradient(135deg, rgba(242, 250, 255, 0.96), rgba(235, 247, 240, 0.98));
        color: #1a4b81;
        font-size: 0.72rem;
        font-weight: 800;
        padding: 0.3rem 0.62rem;
        cursor: pointer;
        transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease;
    }

    .offers-fruit-chip.active {
        color: #ffffff;
        border-color: rgba(29, 111, 69, 0.62);
        background: linear-gradient(130deg, #1d6f45, #2b8a58);
        box-shadow: 0 8px 16px rgba(18, 83, 51, 0.22);
    }

    @media (min-width: 1025px) {
        .offers-fruit-chips {
            overflow: visible;
            white-space: normal;
        }

        .offers-fruit-chip:hover {
            transform: translateY(-1px);
        }
    }

    .offers-active-filters {
        display: flex;
        flex-wrap: wrap;
        gap: 0.4rem;
        margin-bottom: 0.7rem;
    }

    .offers-filter-chip {
        display: inline-flex;
        align-items: center;
        gap: 0.3rem;
        border-radius: 999px;
        border: 1px solid rgba(21, 82, 129, 0.22);
        background: linear-gradient(135deg, rgba(242, 251, 255, 0.98), rgba(237, 248, 242, 0.98));
        color: #1b4e83;
        font-size: 0.72rem;
        font-weight: 700;
        padding: 0.24rem 0.58rem;
    }

    .offers-filter-chip-remove {
        border: none;
        background: transparent;
        color: #2f638f;
        font-size: 0.84rem;
        line-height: 1;
        padding: 0;
        cursor: pointer;
    }

    .offers-filter-chip.clear-all {
        border-color: rgba(153, 53, 53, 0.24);
        background: linear-gradient(135deg, rgba(255, 244, 244, 0.98), rgba(255, 236, 236, 0.98));
        color: #a23333;
        cursor: pointer;
    }

    .offers-filter-trigger {
        border: 1px solid rgba(17, 73, 125, 0.2);
        background: linear-gradient(135deg, rgba(242, 250, 255, 0.96), rgba(235, 247, 240, 0.98));
        color: #1a4b81;
        border-radius: 10px;
        width: 42px;
        height: 42px;
        display: none;
        align-items: center;
        justify-content: center;
        position: relative;
        transition: transform 0.16s ease, box-shadow 0.16s ease, border-color 0.16s ease, background 0.16s ease;
    }

    .offers-filter-trigger.is-active {
        border-color: rgba(20, 97, 56, 0.42);
        background: linear-gradient(135deg, rgba(229, 248, 234, 0.98), rgba(219, 241, 255, 0.98));
        color: #1c6940;
        box-shadow: 0 8px 16px rgba(18, 83, 51, 0.2);
    }

    .offers-filter-trigger-count {
        position: absolute;
        top: -7px;
        right: -7px;
        min-width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 2px solid #ffffff;
        background: #1f6d41;
        color: #ffffff;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.62rem;
        font-weight: 800;
        padding: 0 4px;
        line-height: 1;
    }

    .offers-store-featured {
        border: 1px solid rgba(24, 83, 56, 0.28);
        border-radius: 14px;
        background: linear-gradient(145deg, rgba(247, 252, 245, 0.95), rgba(237, 246, 251, 0.92));
        box-shadow: 0 14px 30px rgba(16, 53, 83, 0.12);
        padding: 0.72rem;
        margin-bottom: 0.95rem;
    }

    .offers-store-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 0.6rem;
        margin-bottom: 0.45rem;
        flex-wrap: wrap;
    }

    .offers-store-title {
        margin: 0;
        font-size: 0.9rem;
        font-weight: 800;
        letter-spacing: -0.02em;
        color: #18553a;
    }

    .offers-store-row {
        display: flex;
        gap: 0.62rem;
        overflow-x: auto;
        padding-bottom: 0.2rem;
    }

    .offers-store-card {
        min-width: 192px;
        max-width: 192px;
        border: 1px solid rgba(20, 75, 122, 0.18);
        border-radius: 12px;
        background: linear-gradient(150deg, rgba(255, 255, 255, 0.92), rgba(241, 249, 244, 0.9));
        box-shadow: 0 10px 22px rgba(20, 61, 95, 0.12);
        overflow: hidden;
        text-decoration: none;
        color: inherit;
        transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }

    .offers-store-card:hover {
        transform: translateY(-2px);
        border-color: rgba(24, 99, 57, 0.35);
        box-shadow: 0 16px 26px rgba(23, 74, 47, 0.18);
    }

    .offers-store-media {
        height: 90px;
        background: linear-gradient(140deg, rgba(232, 245, 237, 0.92), rgba(231, 242, 252, 0.92));
        display: flex;
        align-items: center;
        justify-content: center;
    }

    .offers-store-media img {
        max-width: 92%;
        max-height: 92%;
        object-fit: contain;
    }

    .offers-store-body {
        padding: 0.5rem;
        display: grid;
        gap: 0.2rem;
    }

    .offers-store-cat {
        font-size: 0.62rem;
        color: #4b6b8a;
        text-transform: uppercase;
        font-weight: 700;
    }

    .offers-store-name {
        margin: 0;
        font-size: 0.72rem;
        font-weight: 800;
        color: #1a4f78;
        min-height: 1.7rem;
    }

    .offers-store-price {
        font-size: 0.72rem;
        font-weight: 800;
        color: #1f6d41;
    }

    .offers-filter-overlay {
        position: fixed;
        inset: 0;
        background: rgba(10, 21, 37, 0.48);
        backdrop-filter: blur(2px);
        -webkit-backdrop-filter: blur(2px);
        z-index: 2220;
        display: none;
    }

    .offers-filter-overlay.show {
        display: block;
    }

    @keyframes wfToastIn {
        0% {
            opacity: 0;
            transform: translateY(8px) scale(0.98);
        }
        100% {
            opacity: 1;
            transform: translateY(0) scale(1);
        }
    }

    .offers-new-toast {
        position: fixed;
        right: 1rem;
        bottom: calc(92px + env(safe-area-inset-bottom));
        z-index: 1420;
        display: none;
        align-items: center;
        gap: 0.42rem;
        border-radius: 999px;
        border: 1px solid rgba(0, 212, 170, 0.34);
        background: rgba(7, 30, 44, 0.94);
        color: #d8fff6;
        padding: 0.44rem 0.7rem;
        font-size: 0.74rem;
        font-weight: 800;
        box-shadow: 0 14px 26px rgba(6, 24, 37, 0.34);
        transform-origin: right bottom;
        animation: wfToastIn 0.22s cubic-bezier(0.22, 1, 0.36, 1);
        max-width: min(92vw, 360px);
    }

    .offers-new-toast .material-icons {
        font-size: 1rem;
        flex: 0 0 auto;
    }

    .offers-new-toast span:last-child {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
    }

    .offers-filters-head {
        display: none;
    }

    .offers-search-wrap {
        position: relative;
    }

    .offers-search-wrap .material-symbols-outlined {
        position: absolute;
        left: 10px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 18px;
        color: var(--wf-text-secondary);
    }

    .offers-search-input {
        padding-left: 2rem !important;
    }

    .produto-card {
        display: flex;
        min-height: 186px;
        border-radius: 12px;
        border: 1px solid rgba(27, 69, 118, 0.16);
        background: linear-gradient(140deg, #fffdf6 0%, #f6fbff 58%, #eef7f0 100%);
        box-shadow: 0 10px 22px rgba(21, 49, 88, 0.1);
        overflow: hidden;
        cursor: pointer;
        transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    }

    .produto-card:hover {
        transform: translateY(-2px);
        border-color: rgba(46, 125, 50, 0.35);
        box-shadow: 0 14px 26px rgba(22, 74, 40, 0.16);
    }

    .produto-img-wrap {
        width: 64px;
        min-width: 64px;
        min-height: 186px;
        border-right: 1px solid rgba(27, 69, 118, 0.14);
        background: linear-gradient(180deg, rgba(237, 247, 255, 0.9), rgba(238, 248, 240, 0.8));
    }

    .produto-img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
    }

    .produto-content {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 0.75rem;
        padding: 0.8rem;
    }

    .produtor-box {
        display: flex;
        align-items: center;
        gap: 0.55rem;
    }

    .produtor-avatar {
        width: 25px;
        height: 25px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(21, 68, 128, 0.16);
        background: rgba(206, 227, 247, 0.58);
    }

    .produtor-avatar-fallback {
        width: 25px;
        height: 25px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.64rem;
        font-weight: 700;
        color: #103463;
        background: #dbeafe;
    }

    .produtor-info {
        line-height: 1.15;
    }

    .produtor-nome {
        font-size: 0.8rem;
        font-weight: 700;
        color: #123b72;
    }

    .produtor-username {
        font-size: 0.7rem;
        color: #4f6f96;
    }

    .fruta-nome {
        font-size: 0.98rem;
        font-weight: 800;
        color: #1e4d8a;
        letter-spacing: -0.3px;
        margin: 0.35rem 0 0.45rem;
    }

    .price-box {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.35rem;
        background: linear-gradient(135deg, rgba(243, 250, 255, 0.95), rgba(232, 247, 238, 0.96));
        border: 1px solid rgba(38, 119, 64, 0.24);
        border-radius: 10px;
        padding: 0.45rem;
        margin-bottom: 0.45rem;
    }

    .price-col {
        text-align: center;
        border-right: 1px dashed rgba(17, 73, 125, 0.14);
    }

    .price-col:last-child {
        border-right: none;
    }

    .price-label {
        display: block;
        font-size: 0.62rem;
        text-transform: uppercase;
        color: #4e6c92;
        letter-spacing: 0.3px;
        margin-bottom: 2px;
    }

    .price-val {
        font-size: 0.82rem;
        font-weight: 700;
        color: #18497f;
    }

    .mini-meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.35rem;
    }

    .mini-meta-card {
        border-radius: 8px;
        border: 1px solid rgba(17, 73, 125, 0.16);
        background: linear-gradient(135deg, rgba(247, 252, 255, 0.95), rgba(240, 250, 244, 0.92));
        padding: 0.3rem 0.35rem;
        min-height: 42px;
    }

    .mini-meta-top {
        display: flex;
        align-items: center;
        gap: 3px;
        color: #4f6c93;
        font-size: 0.6rem;
        margin-bottom: 1px;
    }

    .mini-meta-val {
        font-size: 0.69rem;
        color: #173f73;
        font-weight: 600;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }

    .material-symbols-outlined {
        font-size: 15px;
        font-variation-settings: "FILL" 0, "wght" 400, "GRAD" 0, "opsz" 20;
    }

    .product-actions {
        display: flex;
        gap: 0.35rem;
        margin-top: 0.5rem;
    }

    .action-primary,
    .action-secondary,
    .action-side {
        border: 1px solid rgba(17, 73, 125, 0.16);
        border-radius: 999px;
        background: rgba(247, 253, 255, 0.9);
        color: #194a82;
        transition: all 0.2s ease;
    }

    .action-primary,
    .action-secondary {
        font-size: 0.72rem;
        font-weight: 600;
        padding: 0.35rem 0.72rem;
    }

    .action-primary {
        background: linear-gradient(135deg, #2f855a, #3f9c67);
        border-color: rgba(37, 116, 71, 0.5);
        color: #f6fff8;
    }

    .action-secondary {
        background: linear-gradient(135deg, #e7f3ff, #dff0ff);
        border-color: rgba(24, 89, 155, 0.3);
        color: #1c4f86;
    }

    .action-secondary:hover,
    .action-primary:hover,
    .action-side:hover {
        transform: translateY(-1px);
        border-color: rgba(255, 255, 255, 0.3);
    }

    .card-side {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: space-between;
        gap: 0.45rem;
    }

    .action-side {
        width: 34px;
        height: 34px;
        border-radius: 9px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 0;
    }

    .action-side.active-like {
        color: #ff9cb0;
        border-color: rgba(255, 156, 176, 0.42);
        background: rgba(255, 156, 176, 0.2);
    }

    .action-side.active-bookmark {
        color: #8fe6ff;
        border-color: rgba(143, 230, 255, 0.42);
        background: rgba(143, 230, 255, 0.2);
    }

    .open-tip {
        font-size: 0.62rem;
        color: #4f6f96;
        text-align: center;
        line-height: 1.2;
        max-width: 34px;
    }

    .empty-state {
        text-align: center;
        padding: 3rem 1rem;
        border: 1px dashed var(--wf-border);
        border-radius: 12px;
        color: var(--wf-text-secondary);
    }

        .messages-float-btn {
            position: fixed;
            right: 22px;
            bottom: 22px;
            width: 58px;
            height: 58px;
            border-radius: 50%;
            background: var(--wf-accent);
            color: #0a0a0f;
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            box-shadow: 0 10px 30px rgba(0, 212, 170, 0.45);
            z-index: 1300;
        }

        .messages-float-btn .material-symbols-outlined {
            font-size: 27px;
        }

        .messages-float-count {
            position: absolute;
            top: -4px;
            right: -2px;
            min-width: 22px;
            height: 22px;
            border-radius: 11px;
            background: #ff4d6a;
            color: #fff;
            font-size: 0.75rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 6px;
            border: 2px solid #0a0a0f;
        }

    .skeleton-card {
        min-height: 186px;
        border-radius: 8px;
        border: 1px solid var(--wf-border);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 20%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 80%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    @media (max-width: 1024px) {
        .offers-list {
            grid-template-columns: 1fr;
        }

        .offers-filter-trigger {
            display: inline-flex;
        }

        .offers-filters {
            position: fixed;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.96);
            width: min(92vw, 520px);
            grid-template-columns: 1fr;
            background: linear-gradient(145deg, rgba(248, 253, 249, 0.98), rgba(236, 246, 252, 0.97));
            border: 1px solid rgba(22, 85, 56, 0.24);
            border-radius: 14px;
            box-shadow: 0 22px 44px rgba(8, 28, 53, 0.28);
            padding: 0.85rem;
            z-index: 2230;
            margin-bottom: 0;
            opacity: 0;
            pointer-events: none;
            transition: transform 0.12s ease, opacity 0.12s ease;
        }

        .offers-filters-head {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 0.5rem;
            margin-bottom: 0.25rem;
            font-size: 0.88rem;
            font-weight: 800;
            color: #1c4e82;
        }

        .offers-filters-close {
            border: none;
            border-radius: 8px;
            background: rgba(23, 75, 121, 0.12);
            color: #1f578a;
            width: 28px;
            height: 28px;
            font-size: 1rem;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .offers-filters.mobile-open {
            transform: translate(-50%, -50%) scale(1);
            opacity: 1;
            pointer-events: auto;
        }

        .offers-filters .btn {
            width: 100%;
        }

        .produto-card {
            min-height: 202px;
        }

        .produto-img-wrap {
            min-height: 202px;
        }
    }

    @media (max-width: 840px) {
        .offers-new-toast {
            right: 0.75rem;
            bottom: calc(84px + env(safe-area-inset-bottom));
            padding: 0.4rem 0.64rem;
            font-size: 0.71rem;
            box-shadow: 0 10px 18px rgba(6, 24, 37, 0.26);
            background: rgba(7, 30, 44, 0.9);
        }

        .offers-header h1 {
            font-size: 1.5rem;
        }

        .produto-content {
            grid-template-columns: 1fr;
        }

        .card-side {
            flex-direction: row;
            justify-content: flex-start;
            align-items: center;
            margin-top: 0.35rem;
        }

        .open-tip {
            max-width: none;
            text-align: left;
        }
    }

    @media (max-width: 640px) {
        .produto-card {
            min-height: 196px;
        }

        .produto-img-wrap {
            min-height: 196px;
        }

        .mini-meta-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .offers-search-row {
            grid-template-columns: 1fr auto;
        }

        .offers-fruit-chips {
            flex-wrap: nowrap;
            overflow-x: auto;
            overflow-y: hidden;
            -webkit-overflow-scrolling: touch;
            scroll-snap-type: x proximity;
            padding-bottom: 0.2rem;
            margin-right: -0.1rem;
            scrollbar-width: none;
            mask-image: linear-gradient(to right, transparent 0, #000 14px, #000 calc(100% - 14px), transparent 100%);
        }

        .offers-fruit-chips::-webkit-scrollbar {
            display: none;
        }

        .offers-fruit-chip {
            flex: 0 0 auto;
            scroll-snap-align: start;
            white-space: nowrap;
        }
    }
</style>

<a href="/messages" class="messages-float-btn" title="Minhas mensagens">
    <span class="material-symbols-outlined">chat</span>
    <span id="messagesFloatCount" class="messages-float-count" style="display:none;">0</span>
</a>

<div class="offers-header">
    <div>
        <h1>Ofertas <span class="wf-gradient-text">Disponíveis</span></h1>
        <div class="offers-count" id="offersCount"></div>
        <div class="offers-live-controls" aria-label="Controles de atualização automática">
            <button id="offersRefreshToggle" class="offers-live-btn" type="button">
                <span class="material-icons">pause_circle</span>
                <span id="offersRefreshToggleText">Pausar auto-refresh</span>
            </button>
            <button id="offersRefreshInterval" class="offers-live-btn" type="button">
                <span class="material-icons">schedule</span>
                <span id="offersRefreshIntervalText">45s</span>
            </button>
        </div>
    </div>
    <a href="/offers/new" class="btn btn-wf-secondary">+ Criar oferta</a>
</div>

<div class="offers-search-row">
    <div class="offers-search-wrap">
        <span class="material-symbols-outlined">search</span>
        <input id="filterSearch" class="wf-input form-control offers-search-input" type="text" placeholder="Buscar ofertas, produtor ou localização">
    </div>
    <button type="button" class="offers-filter-trigger" id="offersFilterTrigger" title="Abrir filtros" aria-label="Abrir filtros">
        <span class="material-symbols-outlined">tune</span>
        <span class="offers-filter-trigger-count" id="offersFilterTriggerCount" style="display:none;">0</span>
    </button>
</div>

<div class="offers-fruit-chips" id="offersFruitChips"></div>

<div class="offers-active-filters" id="activeFilterChips"></div>

<div class="offers-filter-overlay" id="offersFilterOverlay"></div>

<div class="offers-filters" id="offersFiltersPanel">
    <div class="offers-filters-head">
        <span>Filtros</span>
        <button type="button" class="offers-filters-close" id="offersFiltersCloseBtn" aria-label="Fechar filtros">×</button>
    </div>
    <input id="filterCategory" class="wf-input form-control" type="text" placeholder="Categoria">
    <input id="filterLocation" class="wf-input form-control" type="text" placeholder="Localização">
    <input id="filterMinPrice" class="wf-input form-control" type="number" min="0" step="0.01" placeholder="Preço mín">
    <input id="filterMaxPrice" class="wf-input form-control" type="number" min="0" step="0.01" placeholder="Preço máx">
    <select id="filterSort" class="wf-input form-control" aria-label="Ordenar ofertas">
        <option value="">Ordenar: padrão</option>
        <option value="price_asc">Preço: menor para maior</option>
        <option value="price_desc">Preço: maior para menor</option>
        <option value="newest">Mais recentes</option>
        <option value="distance">Mais próximos de mim</option>
    </select>
    <button class="btn btn-wf-secondary" type="button" onclick="applyFilters()">Aplicar filtros</button>
    <button class="btn btn-wf-secondary" type="button" onclick="clearFilters()">Limpar filtros</button>
</div>

<section class="offers-store-featured" aria-label="Produtos em destaque da loja">
    <div class="offers-store-head">
        <h2 class="offers-store-title">Anúncios de produtos em destaque</h2>
        <a href="/store" class="btn btn-wf-secondary" style="padding:0.34rem 0.75rem;font-size:0.73rem;">Ver loja</a>
    </div>
    <div id="offersFeaturedStore" class="offers-store-row"></div>
</section>

<div class="offers-list wf-stagger" id="offersContainer">
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
    <div class="skeleton-card"></div>
</div>
<div id="offersLoadMoreSentinel" style="height:2px;"></div>
<div id="offersLoadMoreStatus" class="offers-count" style="margin-top:0.45rem;"></div>

<button id="offersNewToast" class="offers-new-toast" type="button" aria-label="Ver novas ofertas">
    <span class="material-icons">north</span>
    <span id="offersNewToastText">Novas ofertas disponíveis</span>
</button>

<script>
    const offersStore = new Map();
    const BOOKMARK_STORAGE_KEY = 'wf_offer_bookmarks';
    const FILTER_PREFS_STORAGE_KEY = 'wf_offers_filter_prefs_v1';
    const OFFERS_FILTER_BREAKPOINT = 1024;
    const SEARCH_DEBOUNCE_MS = 260;
    const OFFERS_PAGE_SIZE = 12;
    const OFFERS_AUTO_REFRESH_DEFAULT_MS = 45000;
    const OFFERS_AUTO_REFRESH_OPTIONS = [20000, 45000, 90000];
    const OFFERS_REFRESH_PAUSED_KEY = 'wf_offers_refresh_paused';
    const OFFERS_REFRESH_INTERVAL_KEY = 'wf_offers_refresh_interval_ms';
    const OFFERS_FRUIT_CHIPS = [
        'Banana',
        'Manga',
        'Laranja',
        'Maçã',
        'Uva',
        'Abacaxi',
        'Mamão',
        'Melancia',
        'Goiaba',
        'Limão',
    ];
    let searchDebounceTimer = null;
    let offersObserver = null;
    let offersRefreshTimer = null;
    let offersRefreshPaused = false;
    let offersRefreshIntervalMs = OFFERS_AUTO_REFRESH_DEFAULT_MS;
    let pendingFreshOffers = 0;
    let userGeo = null;
    const offersFeedState = {
        skip: 0,
        hasMore: true,
        isLoading: false,
        prefetch: null,
        signature: '',
        items: [],
    };
    const REAL_PRODUCT_IMAGES = {
        banana: 'https://images.unsplash.com/photo-1571771894821-ce9b6c11b08e?auto=format&fit=crop&w=1200&q=80',
        manga: 'https://images.unsplash.com/photo-1591073113125-e46713c829ed?auto=format&fit=crop&w=1200&q=80',
        laranja: 'https://images.unsplash.com/photo-1580052614034-c55d20bfee3b?auto=format&fit=crop&w=1200&q=80',
        tomate: 'https://images.unsplash.com/photo-1546470427-e26264be0b0d?auto=format&fit=crop&w=1200&q=80',
        abacaxi: 'https://images.unsplash.com/photo-1589820296156-2454bb8a6ad1?auto=format&fit=crop&w=1200&q=80',
        cafe: 'https://images.unsplash.com/photo-1447933601403-0c6688de566e?auto=format&fit=crop&w=1200&q=80',
        leite: 'https://images.unsplash.com/photo-1550583724-b2692b85b150?auto=format&fit=crop&w=1200&q=80',
        milho: 'https://images.unsplash.com/photo-1551754655-cd27e38d2076?auto=format&fit=crop&w=1200&q=80',
        grao: 'https://images.unsplash.com/photo-1471193945509-9ad0617afabf?auto=format&fit=crop&w=1200&q=80',
        default: 'https://images.unsplash.com/photo-1542838132-92c53300491e?auto=format&fit=crop&w=1200&q=80',
    };

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text ?? '';
        return div.innerHTML;
    }

    function normalizeText(value) {
        return String(value || '')
            .normalize('NFD')
            .replace(/[\u0300-\u036f]/g, '')
            .toLowerCase()
            .trim();
    }

    function renderFruitChips() {
        const chipsWrap = document.getElementById('offersFruitChips');
        const searchInput = document.getElementById('filterSearch');
        if (!chipsWrap || !searchInput) return;

        const activeSearch = normalizeText(searchInput.value);
        const items = ['Todas', ...OFFERS_FRUIT_CHIPS];

        chipsWrap.innerHTML = items.map((item) => {
            const isAll = item === 'Todas';
            const isActive = isAll
                ? OFFERS_FRUIT_CHIPS.every((fruit) => normalizeText(fruit) !== activeSearch)
                : normalizeText(item) === activeSearch;

            return `<button type="button" class="offers-fruit-chip ${isActive ? 'active' : ''}" data-fruit="${escapeHtml(item)}">${escapeHtml(item)}</button>`;
        }).join('');

        chipsWrap.querySelectorAll('.offers-fruit-chip').forEach((chip) => {
            chip.addEventListener('click', () => {
                const fruit = chip.getAttribute('data-fruit') || 'Todas';
                searchInput.value = fruit === 'Todas' ? '' : fruit;
                renderFruitChips();
                renderActiveFilterChips();
                saveFilterPrefs();
                writeFiltersToUrl();
                loadOffers();
            });
        });
    }

    function offersIntervalLabel(ms) {
        return `${Math.max(1, Math.round(ms / 1000))}s`;
    }

    function renderOffersRefreshControls() {
        const toggle = document.getElementById('offersRefreshToggle');
        const toggleText = document.getElementById('offersRefreshToggleText');
        const intervalText = document.getElementById('offersRefreshIntervalText');
        if (toggle && toggleText) {
            toggleText.textContent = offersRefreshPaused ? 'Retomar auto-refresh' : 'Pausar auto-refresh';
            toggle.classList.toggle('is-paused', offersRefreshPaused);
        }
        if (intervalText) {
            intervalText.textContent = offersIntervalLabel(offersRefreshIntervalMs);
        }
    }

    function showOffersToast(message) {
        const toast = document.getElementById('offersNewToast');
        const text = document.getElementById('offersNewToastText');
        if (!toast || !text) return;
        text.textContent = message;
        toast.style.display = 'inline-flex';
    }

    function hideOffersToast() {
        const toast = document.getElementById('offersNewToast');
        if (!toast) return;
        toast.style.display = 'none';
    }

    function restartOffersAutoRefresh() {
        if (offersRefreshTimer) {
            window.clearInterval(offersRefreshTimer);
            offersRefreshTimer = null;
        }

        if (offersRefreshPaused) return;

        offersRefreshTimer = window.setInterval(() => {
            silentRefreshOffers();
        }, offersRefreshIntervalMs);
    }

    function setOffersRefreshPaused(paused) {
        offersRefreshPaused = Boolean(paused);
        try {
            localStorage.setItem(OFFERS_REFRESH_PAUSED_KEY, offersRefreshPaused ? '1' : '0');
        } catch {
            // ignora indisponibilidade de storage
        }
        renderOffersRefreshControls();
        restartOffersAutoRefresh();
    }

    function cycleOffersRefreshInterval() {
        const currentIndex = OFFERS_AUTO_REFRESH_OPTIONS.indexOf(offersRefreshIntervalMs);
        const nextIndex = (currentIndex + 1) % OFFERS_AUTO_REFRESH_OPTIONS.length;
        offersRefreshIntervalMs = OFFERS_AUTO_REFRESH_OPTIONS[nextIndex];
        try {
            localStorage.setItem(OFFERS_REFRESH_INTERVAL_KEY, String(offersRefreshIntervalMs));
        } catch {
            // ignora indisponibilidade de storage
        }
        renderOffersRefreshControls();
        restartOffersAutoRefresh();
    }

    function toCurrency(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return 'R$ -';
        }
        return `R$ ${Number(value).toFixed(2)}`;
    }

    function fallbackImageSvg(label) {
        const safeLabel = encodeURIComponent((label || 'Fruta').slice(0, 16));
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='400' height='700'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%231a1a23'/><stop offset='100%' stop-color='%23262835'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)'/><circle cx='200' cy='260' r='90' fill='%23EDA44C' opacity='0.25'/><text x='50%' y='80%' dominant-baseline='middle' text-anchor='middle' fill='%23e8e8ed' font-size='30' font-family='Arial'>${safeLabel}</text></svg>`;
        return `data:image/svg+xml;utf8,${svg}`;
    }

    function getRealProductFallbackImage(name, category = '') {
        const raw = `${name || ''} ${category || ''}`.toLowerCase();
        if (raw.includes('banana')) return REAL_PRODUCT_IMAGES.banana;
        if (raw.includes('manga')) return REAL_PRODUCT_IMAGES.manga;
        if (raw.includes('laranja') || raw.includes('orange')) return REAL_PRODUCT_IMAGES.laranja;
        if (raw.includes('tomate')) return REAL_PRODUCT_IMAGES.tomate;
        if (raw.includes('abacaxi') || raw.includes('pineapple')) return REAL_PRODUCT_IMAGES.abacaxi;
        if (raw.includes('cafe')) return REAL_PRODUCT_IMAGES.cafe;
        if (raw.includes('leite')) return REAL_PRODUCT_IMAGES.leite;
        if (raw.includes('milho') || raw.includes('corn')) return REAL_PRODUCT_IMAGES.milho;
        if (raw.includes('grao') || raw.includes('bean')) return REAL_PRODUCT_IMAGES.grao;
        return REAL_PRODUCT_IMAGES.default;
    }

    function getOfferImage(offer) {
        if (Array.isArray(offer.images) && offer.images.length > 0 && offer.images[0]) {
            return offer.images[0];
        }
        return getRealProductFallbackImage(offer.product_name, offer.category);
    }

    function getStoreProductImage(product) {
        return product.image || getRealProductFallbackImage(product.name, product.category);
    }

    function getOwnerUsername(offer) {
        const email = offer.owner_data?.email || '';
        if (email.includes('@')) {
            return '@' + email.split('@')[0];
        }
        const ownerId = offer.owner_data?.id || offer.user_id;
        return `@produtor${ownerId}`;
    }

    function ownerContactLockBadge(offer) {
        if (!offer.contact_locked && !offer.owner_data?.contact_locked) return '';
        const reason = (offer.restriction_message || offer.owner_data?.contact_lock_reason || 'Contato completo disponível para assinantes Premium.').replace(/'/g, "\\'");
        return `<button type="button" class="wf-badge wf-badge-neutral" style="margin-top:0.24rem;font-size:0.63rem;padding:0.18rem 0.45rem;" onclick="event.stopPropagation();showRestrictedAccessNotice('${reason}')">🔒 contato premium</button>`;
    }

    function getOwnerAvatar(offer) {
        const src = window.wfResolveAvatar
            ? window.wfResolveAvatar(offer.owner_data?.profile_image)
            : (offer.owner_data?.profile_image || '');
        return `<img class="produtor-avatar" src="${escapeHtml(src)}" alt="Avatar do produtor" onerror="wfAvatarOnError(this)">`;
    }

    function ownerProfileUrl(offer) {
        const ownerId = offer.owner_data?.id || offer.user_id;
        return `/users/${ownerId}`;
    }

    function getBookmarks() {
        try {
            return JSON.parse(localStorage.getItem(BOOKMARK_STORAGE_KEY) || '[]');
        } catch {
            return [];
        }
    }

    function isBookmarked(offerId) {
        return getBookmarks().includes(offerId);
    }

    function setBookmarked(offerId, enabled) {
        const set = new Set(getBookmarks());
        if (enabled) {
            set.add(offerId);
        } else {
            set.delete(offerId);
        }
        localStorage.setItem(BOOKMARK_STORAGE_KEY, JSON.stringify(Array.from(set)));
    }

    function cardMetaItems(offer) {
        const quantity = offer.available_quantity || offer.quantity || '-';
        const market = offer.target_market || offer.origin || '-';

        return [
            { icon: 'balance', label: 'Quantidade', value: `${quantity} ${offer.unit || 'kg'}` },
            { icon: 'wifi', label: 'Disponivel', value: offer.status || '-' },
            { icon: 'list', label: 'Qualidade', value: offer.quality_class || offer.quality_grade || '-' },
            { icon: 'workspace_premium', label: 'Certificacao', value: offer.certification || '-' },
            { icon: 'timer', label: 'Duracao', value: offer.ad_duration_days ? `${offer.ad_duration_days} dias` : (offer.shelf_life ? `${offer.shelf_life} dias` : '-') },
            { icon: 'storefront', label: 'Mercado', value: market },
        ];
    }

    function renderOfferCard(offer) {
        const min = offer.price_min_kg ?? offer.price_per_kg ?? offer.price;
        const perKg = offer.price_per_kg ?? offer.price_avg_kg ?? offer.price;
        const max = offer.price_max_kg ?? offer.price_per_kg ?? offer.price;

        const metaCards = cardMetaItems(offer).map((item) => `
            <div class="mini-meta-card">
                <div class="mini-meta-top">
                    <span class="material-symbols-outlined">${item.icon}</span>
                    <span>${escapeHtml(item.label)}</span>
                </div>
                <div class="mini-meta-val" title="${escapeHtml(String(item.value))}">${escapeHtml(String(item.value))}</div>
            </div>
        `).join('');

        const bookmarked = isBookmarked(offer.id);

        return `
            <article class="produto-card" data-offer-id="${offer.id}">
                <div class="produto-img-wrap">
                    <img class="produto-img" src="${escapeHtml(getOfferImage(offer))}" alt="Imagem de ${escapeHtml(offer.product_name)}" onerror="this.onerror=null;this.src='${escapeHtml(getRealProductFallbackImage(offer.product_name, offer.category))}'">
                </div>

                <div class="produto-content">
                    <div>
                        <div class="produtor-box">
                            <a href="${ownerProfileUrl(offer)}" onclick="event.stopPropagation()" style="display:flex;align-items:center;gap:0.65rem;text-decoration:none;color:inherit;">
                                ${getOwnerAvatar(offer)}
                                <div class="produtor-info">
                                    <div class="produtor-nome">${escapeHtml(offer.owner_data?.name || 'Produtor')}</div>
                                    <div class="produtor-username">${escapeHtml(getOwnerUsername(offer))}</div>
                                    ${ownerContactLockBadge(offer)}
                                </div>
                            </a>
                        </div>

                        <h3 class="fruta-nome">${escapeHtml(offer.product_name)}</h3>

                        <div class="price-box">
                            <div class="price-col">
                                <span class="price-label">Preco min</span>
                                <span class="price-val">${toCurrency(min)}</span>
                            </div>
                            <div class="price-col">
                                <span class="price-label">Preco/kg</span>
                                <span class="price-val">${toCurrency(perKg)}</span>
                            </div>
                            <div class="price-col">
                                <span class="price-label">Preco max</span>
                                <span class="price-val">${toCurrency(max)}</span>
                            </div>
                        </div>

                        <div class="mini-meta-grid">${metaCards}</div>

                        <div class="product-actions">
                            <button class="action-primary" onclick="notifyProducer('${offer.id}', event)">Avisar</button>
                            <button class="action-secondary" onclick="reserveOffer('${offer.id}', event)">Reservar</button>
                        </div>
                    </div>

                    <div class="card-side">
                        <button class="action-side ${offer.is_favorited ? 'active-like' : ''}" title="Curtir" onclick="toggleLike('${offer.id}', event)">
                            <span class="material-symbols-outlined">favorite</span>
                        </button>
                        <button class="action-side ${bookmarked ? 'active-bookmark' : ''}" title="Bookmark" onclick="toggleBookmark('${offer.id}', event)">
                            <span class="material-symbols-outlined">bookmark</span>
                        </button>
                        <button class="action-side" title="Chat" onclick="openChat('${offer.id}', event)">
                            <span class="material-symbols-outlined">chat</span>
                        </button>
                        <div class="open-tip">abrir detalhes</div>
                    </div>
                </div>
            </article>
        `;
    }

    async function notifyProducer(offerId, event) {
        event.stopPropagation();

        const offer = offersStore.get(offerId);
        const receiverId = offer?.owner_data?.id;

        if (!receiverId) {
            alert('Nao foi possivel identificar o produtor.');
            return;
        }

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        const content = `Aviso de interesse: tenho interesse na oferta "${offer.product_name}" e gostaria de alinhar detalhes de quantidade, entrega e pagamento.`;

        try {
            const sent = await apiRequest('/messages', 'POST', {
                receiver_id: receiverId,
                offer_id: offer.id,
                message_type: 'offer_inquiry',
                subject: `Interesse na oferta: ${offer.product_name}`,
                content,
            });

            const threadId = sent?.thread_id;
            if (threadId) {
                window.location.href = `/messages?thread_id=${threadId}`;
                return;
            }

            window.location.href = `/messages?user_id=${receiverId}&offer_id=${offer.id}`;
        } catch (error) {
            alert(error.message || 'Nao foi possivel enviar o aviso agora.');
        }
    }

    async function reserveOffer(offerId, event) {
        event.stopPropagation();

        const offer = offersStore.get(offerId);
        if (!offer) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        const defaultQty = Number(offer.min_order || 1);
        const rawQty = prompt(`Quantidade para reservar (${offer.unit || 'kg'}):`, String(defaultQty));
        if (rawQty === null) return;

        const qty = Number(rawQty);
        if (!qty || qty <= 0) {
            alert('Quantidade invalida.');
            return;
        }

        try {
            await apiRequest('/transactions', 'POST', {
                offer_id: offer.id,
                quantity: qty,
                delivery_method: 'pickup',
                payment_method: 'transfer',
            });
            alert('Reserva registrada com sucesso. Acompanhe em Meus pedidos.');
            window.location.href = '/orders';
        } catch (error) {
            alert(error.message || 'Nao foi possivel reservar agora.');
        }
    }

    async function toggleLike(offerId, event) {
        event.stopPropagation();

        const offer = offersStore.get(offerId);
        if (!offer) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        try {
            if (offer.is_favorited) {
                await apiRequest(`/favorites/${offer.id}`, 'DELETE');
                offer.is_favorited = false;
            } else {
                await apiRequest('/favorites', 'POST', { offer_id: offer.id });
                offer.is_favorited = true;
            }

            const button = event.currentTarget;
            button.classList.toggle('active-like', offer.is_favorited);
        } catch (error) {
            alert(error.message || 'Falha ao atualizar favorito.');
        }
    }

    function toggleBookmark(offerId, event) {
        event.stopPropagation();

        const shouldEnable = !isBookmarked(offerId);
        setBookmarked(offerId, shouldEnable);
        event.currentTarget.classList.toggle('active-bookmark', shouldEnable);
    }

    function openChat(offerId, event) {
        event.stopPropagation();
        const offer = offersStore.get(offerId);
        if (!offer) return;

        if (!offer.owner_data?.id) {
            alert('Nao foi possivel identificar o produtor para chat.');
            return;
        }

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        window.location.href = `/messages?user_id=${offer.owner_data.id}&offer_id=${offer.id}`;
    }

    async function loadMessagesBadge() {
        const token = localStorage.getItem('token');
        if (!token) return;
        try {
            const me = await apiRequest('/auth/me');
            const count = Number(me?.unread_messages || 0);
            const badge = document.getElementById('messagesFloatCount');
            badge.textContent = String(count);
            badge.style.display = count > 0 ? 'inline-block' : 'none';
        } catch {
            // ignora falhas do badge de mensagens
        }
    }

    function bindCardOpenBehavior() {
        document.querySelectorAll('.produto-card').forEach((card) => {
            card.addEventListener('click', (event) => {
                const interactive = event.target.closest('button');
                if (interactive) return;

                const offerId = card.dataset.offerId;
                if (!offerId) return;

                window.location.href = `/offers/${offerId}`;
            });
        });
    }

    function buildOffersQuery(skip = 0, limit = OFFERS_PAGE_SIZE) {
        const search = document.getElementById('filterSearch').value.trim();
        const category = document.getElementById('filterCategory').value.trim();
        const location = document.getElementById('filterLocation').value.trim();
        const minPrice = document.getElementById('filterMinPrice').value;
        const maxPrice = document.getElementById('filterMaxPrice').value;
        const sort = document.getElementById('filterSort').value;

        const params = new URLSearchParams();
        params.set('skip', String(skip));
        params.set('limit', String(limit));
        if (search) params.set('search', search);
        if (category) params.set('category', category);
        if (location) params.set('location', location);
        if (minPrice) params.set('min_price', minPrice);
        if (maxPrice) params.set('max_price', maxPrice);

        if (sort === 'price_asc') {
            params.set('sort_by', 'price');
            params.set('sort_order', 'asc');
        } else if (sort === 'price_desc') {
            params.set('sort_by', 'price');
            params.set('sort_order', 'desc');
        } else if (sort === 'newest') {
            params.set('sort_by', 'created_at');
            params.set('sort_order', 'desc');
        }

        if (sort === 'distance' && userGeo?.latitude && userGeo?.longitude) {
            params.set('latitude', String(userGeo.latitude));
            params.set('longitude', String(userGeo.longitude));
            params.set('radius', '100');
        }

        return `/offers?${params.toString()}`;
    }

    function getFilterState() {
        return {
            search: document.getElementById('filterSearch').value.trim(),
            category: document.getElementById('filterCategory').value.trim(),
            location: document.getElementById('filterLocation').value.trim(),
            minPrice: document.getElementById('filterMinPrice').value.trim(),
            maxPrice: document.getElementById('filterMaxPrice').value.trim(),
            sort: document.getElementById('filterSort').value,
        };
    }

    function getFilterSignature() {
        const state = getFilterState();
        return JSON.stringify({
            ...state,
            lat: userGeo?.latitude || null,
            lon: userGeo?.longitude || null,
        });
    }

    function saveFilterPrefs() {
        try {
            localStorage.setItem(FILTER_PREFS_STORAGE_KEY, JSON.stringify(getFilterState()));
        } catch {
            // ignora indisponibilidade de storage
        }
    }

    function loadFilterPrefs() {
        try {
            return JSON.parse(localStorage.getItem(FILTER_PREFS_STORAGE_KEY) || '{}');
        } catch {
            return {};
        }
    }

    function countActiveFilters() {
        const state = getFilterState();
        return [state.search, state.category, state.location, state.minPrice, state.maxPrice, state.sort].filter(Boolean).length;
    }

    function writeFiltersToUrl() {
        const state = getFilterState();
        const params = new URLSearchParams(window.location.search);

        const map = [
            ['search', state.search],
            ['category', state.category],
            ['location', state.location],
            ['min_price', state.minPrice],
            ['max_price', state.maxPrice],
            ['sort', state.sort],
        ];

        map.forEach(([key, value]) => {
            if (value) {
                params.set(key, value);
            } else {
                params.delete(key);
            }
        });

        const query = params.toString();
        const nextUrl = `${window.location.pathname}${query ? `?${query}` : ''}`;
        window.history.replaceState({}, '', nextUrl);
    }

    function hydrateFiltersFromUrl() {
        const params = new URLSearchParams(window.location.search);
        const prefs = loadFilterPrefs();
        const pairs = {
            filterSearch: params.get('search') || prefs.search || '',
            filterCategory: params.get('category') || prefs.category || '',
            filterLocation: params.get('location') || prefs.location || '',
            filterMinPrice: params.get('min_price') || prefs.minPrice || '',
            filterMaxPrice: params.get('max_price') || prefs.maxPrice || '',
            filterSort: params.get('sort') || prefs.sort || '',
        };

        Object.entries(pairs).forEach(([id, value]) => {
            const input = document.getElementById(id);
            if (input) input.value = value;
        });
    }

    function syncFilterTriggerState() {
        const trigger = document.getElementById('offersFilterTrigger');
        const countBadge = document.getElementById('offersFilterTriggerCount');
        if (!trigger || !countBadge) return;

        const total = countActiveFilters();
        trigger.classList.toggle('is-active', total > 0);
        countBadge.textContent = String(total);
        countBadge.style.display = total > 0 ? 'inline-flex' : 'none';
    }

    function renderActiveFilterChips() {
        const chips = document.getElementById('activeFilterChips');
        if (!chips) return;

        const state = getFilterState();
        const labels = [];

        if (state.search) labels.push({ key: 'search', label: `Busca: ${escapeHtml(state.search)}` });
        if (state.category) labels.push({ key: 'category', label: `Categoria: ${escapeHtml(state.category)}` });
        if (state.location) labels.push({ key: 'location', label: `Local: ${escapeHtml(state.location)}` });
        if (state.minPrice) labels.push({ key: 'minPrice', label: `Min: R$ ${escapeHtml(state.minPrice)}` });
        if (state.maxPrice) labels.push({ key: 'maxPrice', label: `Max: R$ ${escapeHtml(state.maxPrice)}` });
        if (state.sort) {
            const sortLabels = {
                price_asc: 'Ordem: menor preço',
                price_desc: 'Ordem: maior preço',
                newest: 'Ordem: mais recentes',
                distance: 'Ordem: mais próximos',
            };
            labels.push({ key: 'sort', label: sortLabels[state.sort] || 'Ordem customizada' });
        }

        if (!labels.length) {
            chips.innerHTML = '';
            syncFilterTriggerState();
            return;
        }

        if (labels.length > 1) {
            labels.push({ key: 'clearAll', label: 'Limpar tudo' });
        }

        chips.innerHTML = labels.map((item) => `
            <span class="offers-filter-chip ${item.key === 'clearAll' ? 'clear-all' : ''}">
                <span>${item.label}</span>
                <button type="button" class="offers-filter-chip-remove" onclick="removeFilterChip('${item.key}')" aria-label="Remover filtro">×</button>
            </span>
        `).join('');

        syncFilterTriggerState();
    }

    function removeFilterChip(key) {
        const map = {
            search: 'filterSearch',
            category: 'filterCategory',
            location: 'filterLocation',
            minPrice: 'filterMinPrice',
            maxPrice: 'filterMaxPrice',
            sort: 'filterSort',
        };

        if (key === 'clearAll') {
            clearFilters();
            return;
        }

        const inputId = map[key];
        if (!inputId) return;
        const node = document.getElementById(inputId);
        if (node) node.value = '';
        renderActiveFilterChips();
        saveFilterPrefs();
        writeFiltersToUrl();
        loadOffers();
    }

    window.removeFilterChip = removeFilterChip;

    function isCompactFilterMode() {
        return window.matchMedia(`(max-width: ${OFFERS_FILTER_BREAKPOINT}px)`).matches;
    }

    function openOffersFilters() {
        const panel = document.getElementById('offersFiltersPanel');
        const overlay = document.getElementById('offersFilterOverlay');
        if (!panel || !overlay) return;
        panel.classList.add('mobile-open');
        overlay.classList.add('show');
    }

    function closeOffersFilters() {
        const panel = document.getElementById('offersFiltersPanel');
        const overlay = document.getElementById('offersFilterOverlay');
        if (!panel || !overlay) return;
        panel.classList.remove('mobile-open');
        overlay.classList.remove('show');
    }

    function setupOffersFilterPopup() {
        const trigger = document.getElementById('offersFilterTrigger');
        const overlay = document.getElementById('offersFilterOverlay');
        const closeBtn = document.getElementById('offersFiltersCloseBtn');

        if (trigger) {
            trigger.addEventListener('click', () => {
                if (!isCompactFilterMode()) return;
                openOffersFilters();
            });
        }

        if (closeBtn) {
            closeBtn.addEventListener('click', closeOffersFilters);
        }

        if (overlay) {
            overlay.addEventListener('click', closeOffersFilters);
        }

        document.addEventListener('keydown', (event) => {
            if (event.key === 'Escape') {
                closeOffersFilters();
            }
        });

        window.addEventListener('resize', () => {
            if (!isCompactFilterMode()) {
                closeOffersFilters();
            }
        });
    }

    function toRad(value) {
        return (Number(value) * Math.PI) / 180;
    }

    function computeDistanceKm(fromLat, fromLon, toLat, toLon) {
        const R = 6371;
        const dLat = toRad(toLat - fromLat);
        const dLon = toRad(toLon - fromLon);
        const a =
            Math.sin(dLat / 2) * Math.sin(dLat / 2) +
            Math.cos(toRad(fromLat)) * Math.cos(toRad(toLat)) *
            Math.sin(dLon / 2) * Math.sin(dLon / 2);
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
        return R * c;
    }

    async function ensureUserGeolocation() {
        if (userGeo?.latitude && userGeo?.longitude) return userGeo;
        if (!navigator.geolocation) throw new Error('Geolocalização não suportada neste dispositivo.');

        const position = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, {
                enableHighAccuracy: true,
                timeout: 8000,
                maximumAge: 120000,
            });
        });

        userGeo = {
            latitude: position.coords.latitude,
            longitude: position.coords.longitude,
        };
        return userGeo;
    }

    function applyDistanceSortIfNeeded(items) {
        const sort = document.getElementById('filterSort')?.value;
        if (sort !== 'distance' || !userGeo?.latitude || !userGeo?.longitude) {
            return items;
        }

        const enriched = items.map((offer) => {
            if (offer.latitude == null || offer.longitude == null) {
                return { ...offer, _wfDistance: Number.POSITIVE_INFINITY };
            }

            return {
                ...offer,
                _wfDistance: computeDistanceKm(
                    userGeo.latitude,
                    userGeo.longitude,
                    Number(offer.latitude),
                    Number(offer.longitude),
                ),
            };
        });

        enriched.sort((a, b) => a._wfDistance - b._wfDistance);
        return enriched;
    }

    function updateLoadMoreStatus(message = '') {
        const status = document.getElementById('offersLoadMoreStatus');
        if (!status) return;
        status.textContent = message;
    }

    async function fetchOffersPage(skip, limit = OFFERS_PAGE_SIZE) {
        const signature = getFilterSignature();
        if (
            offersFeedState.prefetch &&
            offersFeedState.prefetch.signature === signature &&
            offersFeedState.prefetch.skip === skip
        ) {
            if (offersFeedState.prefetch.request) {
                await offersFeedState.prefetch.request;
            }
            const payload = offersFeedState.prefetch.payload;
            offersFeedState.prefetch = null;
            return payload;
        }

        return apiRequest(buildOffersQuery(skip, limit));
    }

    function prefetchNextPage() {
        if (!offersFeedState.hasMore || offersFeedState.isLoading) return;
        const nextSkip = offersFeedState.skip;
        const signature = getFilterSignature();

        if (
            offersFeedState.prefetch &&
            offersFeedState.prefetch.signature === signature &&
            offersFeedState.prefetch.skip === nextSkip
        ) {
            return;
        }

        const request = apiRequest(buildOffersQuery(nextSkip, OFFERS_PAGE_SIZE))
            .then((payload) => {
                offersFeedState.prefetch = {
                    signature,
                    skip: nextSkip,
                    payload,
                };
            })
            .catch(() => {});

        offersFeedState.prefetch = {
            signature,
            skip: nextSkip,
            payload: null,
            request,
        };
    }

    function renderOffersList(items, append = false) {
        const container = document.getElementById('offersContainer');
        if (!container) return;

        if (!append) {
            container.innerHTML = items.map(renderOfferCard).join('');
        } else {
            container.insertAdjacentHTML('beforeend', items.map(renderOfferCard).join(''));
        }

        bindCardOpenBehavior();
    }

    async function silentRefreshOffers() {
        if (offersRefreshPaused || offersFeedState.isLoading || !offersFeedState.items.length) return;

        try {
            const data = await apiRequest(buildOffersQuery(0, Math.min(10, OFFERS_PAGE_SIZE)));
            const latest = Array.isArray(data?.offers) ? data.offers : [];
            if (!latest.length) return;

            const known = new Set(offersFeedState.items.map((item) => String(item.id)));
            const fresh = latest.filter((item) => !known.has(String(item.id)));
            if (!fresh.length) return;

            fresh.forEach((offer) => offersStore.set(offer.id, offer));

            const previousHeight = document.documentElement.scrollHeight;
            const previousScroll = window.scrollY || 0;

            offersFeedState.items = applyDistanceSortIfNeeded(fresh.concat(offersFeedState.items));
            offersFeedState.skip += fresh.length;
            pendingFreshOffers += fresh.length;

            renderOffersList(offersFeedState.items, false);
            document.getElementById('offersCount').textContent = `${offersFeedState.items.length} oferta${offersFeedState.items.length === 1 ? '' : 's'} carregada${offersFeedState.items.length === 1 ? '' : 's'}`;
            updateLoadMoreStatus(`${fresh.length} nova(s) oferta(s) recebida(s).`);

            const delta = document.documentElement.scrollHeight - previousHeight;
            if (delta > 0) {
                window.scrollTo({ top: previousScroll + delta, behavior: 'auto' });
            }

            showOffersToast(`${pendingFreshOffers} nova(s) oferta(s). Toque para ver.`);
        } catch {
            // falha silenciosa para manter a experiência
        }
    }

    async function loadNextOffersPage() {
        if (offersFeedState.isLoading || !offersFeedState.hasMore) return;
        offersFeedState.isLoading = true;

        if (offersFeedState.skip === 0) {
            renderLoadingState();
        } else {
            updateLoadMoreStatus('Carregando mais ofertas...');
        }

        try {
            const data = await fetchOffersPage(offersFeedState.skip, OFFERS_PAGE_SIZE);
            const incoming = Array.isArray(data?.offers) ? data.offers : [];

            incoming.forEach((offer) => offersStore.set(offer.id, offer));
            offersFeedState.items = offersFeedState.items.concat(incoming);
            offersFeedState.items = applyDistanceSortIfNeeded(offersFeedState.items);

            if (!offersFeedState.items.length) {
                const container = document.getElementById('offersContainer');
                container.innerHTML = `
                    <div class="empty-state">
                        <p>Nenhuma oferta cadastrada ainda.</p>
                        <a href="/offers/new" class="btn btn-wf-primary">Criar primeira oferta</a>
                    </div>
                `;
                offersFeedState.hasMore = false;
                updateLoadMoreStatus('');
                return;
            }

            renderOffersList(offersFeedState.items, false);

            offersFeedState.skip += incoming.length;
            offersFeedState.hasMore = incoming.length === OFFERS_PAGE_SIZE;
            document.getElementById('offersCount').textContent = `${offersFeedState.items.length} oferta${offersFeedState.items.length === 1 ? '' : 's'} carregada${offersFeedState.items.length === 1 ? '' : 's'}`;

            if (!offersFeedState.hasMore) {
                updateLoadMoreStatus('Você chegou ao fim das ofertas.');
            } else {
                updateLoadMoreStatus('Role para carregar mais.');
                prefetchNextPage();
            }
        } catch (error) {
            const container = document.getElementById('offersContainer');
            container.innerHTML = `<div class="wf-alert wf-alert-error">${escapeHtml(error.message || 'Falha ao carregar ofertas')}</div>`;
            updateLoadMoreStatus('');
        } finally {
            offersFeedState.isLoading = false;
        }
    }

    function setupInfiniteOffersScroll() {
        const sentinel = document.getElementById('offersLoadMoreSentinel');
        if (!sentinel) return;

        if (offersObserver) {
            offersObserver.disconnect();
        }

        offersObserver = new IntersectionObserver((entries) => {
            entries.forEach((entry) => {
                if (entry.isIntersecting) {
                    loadNextOffersPage();
                }
            });
        }, {
            root: null,
            rootMargin: '260px 0px',
            threshold: 0,
        });

        offersObserver.observe(sentinel);
    }

    function renderLoadingState() {
        const container = document.getElementById('offersContainer');
        if (!container) return;
        container.innerHTML = `
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
            <div class="skeleton-card"></div>
        `;
    }

    function resetOffersFeed() {
        offersFeedState.skip = 0;
        offersFeedState.hasMore = true;
        offersFeedState.isLoading = false;
        offersFeedState.prefetch = null;
        offersFeedState.signature = getFilterSignature();
        offersFeedState.items = [];
        offersStore.clear();
        updateLoadMoreStatus('');
        renderLoadingState();
    }

    async function loadOffers() {
        pendingFreshOffers = 0;
        hideOffersToast();
        resetOffersFeed();
        await loadNextOffersPage();
    }

    async function loadFeaturedStoreProducts() {
        const container = document.getElementById('offersFeaturedStore');
        if (!container) return;

        try {
            const data = await apiRequest('/store/featured?limit=6');
            const products = Array.isArray(data?.products) ? data.products : [];

            if (!products.length) {
                container.innerHTML = '<div class="wf-alert wf-alert-info" style="min-width:100%;">Sem produtos em destaque no momento.</div>';
                return;
            }

            container.innerHTML = products.map((product) => `
                <a href="/store/product/${encodeURIComponent(product.slug)}" class="offers-store-card">
                    <div class="offers-store-media">
                        <img src="${escapeHtml(getStoreProductImage(product))}" alt="${escapeHtml(product.name || 'Produto')}" loading="lazy" onerror="this.onerror=null;this.src='${escapeHtml(getRealProductFallbackImage(product.name, product.category))}'">
                    </div>
                    <div class="offers-store-body">
                        <span class="offers-store-cat">${escapeHtml(product.category || 'Categoria')}</span>
                        <h3 class="offers-store-name">${escapeHtml(product.name || 'Produto')}</h3>
                        <span class="offers-store-price">R$ ${Number(product.price || 0).toFixed(2)}</span>
                    </div>
                </a>
            `).join('');
        } catch {
            container.innerHTML = '<div class="wf-alert wf-alert-error" style="min-width:100%;">Falha ao carregar anúncios da loja.</div>';
        }
    }

    async function applyFilters() {
        const sort = document.getElementById('filterSort')?.value;
        if (sort === 'distance') {
            try {
                await ensureUserGeolocation();
            } catch (error) {
                alert(error.message || 'Não foi possível obter sua localização para ordenar por distância.');
                const sortInput = document.getElementById('filterSort');
                if (sortInput) sortInput.value = '';
            }
        }

        renderActiveFilterChips();
        saveFilterPrefs();
        writeFiltersToUrl();
        loadOffers();
        if (isCompactFilterMode()) {
            closeOffersFilters();
        }
    }

    function clearFilters() {
        ['filterSearch', 'filterCategory', 'filterLocation', 'filterMinPrice', 'filterMaxPrice', 'filterSort'].forEach((id) => {
            const element = document.getElementById(id);
            if (element) element.value = '';
        });
        renderActiveFilterChips();
        saveFilterPrefs();
        writeFiltersToUrl();
        loadOffers();
        if (isCompactFilterMode()) {
            closeOffersFilters();
        }
    }

    ['filterSearch', 'filterCategory', 'filterLocation', 'filterMinPrice', 'filterMaxPrice', 'filterSort'].forEach((id) => {
        const el = document.getElementById(id);
        if (!el) return;

        el.addEventListener('input', () => {
            renderActiveFilterChips();
            if (id === 'filterSearch') {
                renderFruitChips();
            }
            saveFilterPrefs();

            if (id === 'filterSearch') {
                if (searchDebounceTimer) {
                    clearTimeout(searchDebounceTimer);
                }
                searchDebounceTimer = setTimeout(() => {
                    writeFiltersToUrl();
                    loadOffers();
                }, SEARCH_DEBOUNCE_MS);
            } else if (id === 'filterSort') {
                writeFiltersToUrl();
                loadOffers();
            }
        });

        if (id === 'filterSort') {
            el.addEventListener('change', async () => {
                if (el.value === 'distance') {
                    try {
                        await ensureUserGeolocation();
                    } catch (error) {
                        alert(error.message || 'Não foi possível obter sua localização para ordenar por distância.');
                        el.value = '';
                    }
                }
                renderActiveFilterChips();
                saveFilterPrefs();
                writeFiltersToUrl();
                loadOffers();
            });
        }

        el.addEventListener('keydown', (event) => {
            if (event.key === 'Enter') {
                event.preventDefault();
                renderActiveFilterChips();
                if (id === 'filterSearch') {
                    renderFruitChips();
                }
                saveFilterPrefs();
                writeFiltersToUrl();
                loadOffers();
            }
        });
    });

    hydrateFiltersFromUrl();
    try {
        const savedPaused = localStorage.getItem(OFFERS_REFRESH_PAUSED_KEY);
        offersRefreshPaused = savedPaused === '1';

        const savedInterval = Number(localStorage.getItem(OFFERS_REFRESH_INTERVAL_KEY) || OFFERS_AUTO_REFRESH_DEFAULT_MS);
        if (OFFERS_AUTO_REFRESH_OPTIONS.includes(savedInterval)) {
            offersRefreshIntervalMs = savedInterval;
        }
    } catch {
        // ignora indisponibilidade de storage
    }

    const offersRefreshToggle = document.getElementById('offersRefreshToggle');
    const offersRefreshInterval = document.getElementById('offersRefreshInterval');
    const offersToast = document.getElementById('offersNewToast');

    if (offersRefreshToggle) {
        offersRefreshToggle.addEventListener('click', () => {
            setOffersRefreshPaused(!offersRefreshPaused);
        });
    }

    if (offersRefreshInterval) {
        offersRefreshInterval.addEventListener('click', cycleOffersRefreshInterval);
    }

    if (offersToast) {
        offersToast.addEventListener('click', () => {
            window.scrollTo({ top: 0, behavior: 'smooth' });
            pendingFreshOffers = 0;
            hideOffersToast();
        });
    }

    window.addEventListener('scroll', () => {
        if ((window.scrollY || 0) < 40 && pendingFreshOffers > 0) {
            pendingFreshOffers = 0;
            hideOffersToast();
        }
    }, { passive: true });

    renderOffersRefreshControls();
    saveFilterPrefs();
    setupInfiniteOffersScroll();
    renderFruitChips();
    loadOffers();
    loadFeaturedStoreProducts();
    loadMessagesBadge();
    setupOffersFilterPopup();
    renderActiveFilterChips();
    restartOffersAutoRefresh();

    window.addEventListener('beforeunload', () => {
        if (offersRefreshTimer) {
            window.clearInterval(offersRefreshTimer);
        }
    });
</script>
