{% extends "base.html" %}

{% block title %}Detalhes da Oferta - WallFruits{% endblock %}

{% block content %}
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" />
<style>
    .offer-detail-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        flex-wrap: wrap;
        gap: 0.7rem;
        margin-bottom: 1rem;
    }

    .offer-detail-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.6fr) minmax(280px, 1fr);
        gap: 1rem;
    }

    .offer-gallery,
    .offer-summary,
    .offer-section {
        border: 1px solid var(--wf-border);
        border-radius: 12px;
        background: var(--wf-card);
        box-shadow: 0 8px 22px rgba(0, 0, 0, 0.16);
    }

    .offer-gallery {
        overflow: hidden;
    }

    .offer-main-image {
        width: 100%;
        height: 360px;
        object-fit: cover;
        display: block;
        background: rgba(255, 255, 255, 0.04);
    }

    .offer-thumbs {
        display: flex;
        gap: 0.45rem;
        padding: 0.55rem;
        overflow-x: auto;
        border-top: 1px solid rgba(255, 255, 255, 0.07);
    }

    .offer-thumb-btn {
        border: 1px solid rgba(255, 255, 255, 0.15);
        border-radius: 8px;
        overflow: hidden;
        width: 76px;
        height: 60px;
        background: transparent;
        padding: 0;
        flex-shrink: 0;
    }

    .offer-thumb-btn img {
        width: 100%;
        height: 100%;
        object-fit: cover;
    }

    .offer-summary {
        padding: 0.9rem;
    }

    .offer-fruit-name {
        margin: 0.15rem 0 0.45rem;
        color: #eda44c;
        font-size: 1.5rem;
        font-weight: 800;
        letter-spacing: -0.4px;
    }

    .producer-row {
        display: flex;
        align-items: center;
        gap: 0.65rem;
        margin-bottom: 0.65rem;
    }

    .producer-avatar {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        object-fit: cover;
        border: 1px solid rgba(255, 255, 255, 0.15);
        background: rgba(255, 255, 255, 0.05);
    }

    .producer-avatar-fallback {
        width: 34px;
        height: 34px;
        border-radius: 50%;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 0.72rem;
        font-weight: 800;
        background: #eda44c;
        color: #0a0a0f;
    }

    .producer-name {
        font-size: 0.9rem;
        font-weight: 700;
    }

    .producer-username {
        font-size: 0.75rem;
        color: var(--wf-text-secondary);
    }

    .price-box {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.35rem;
        background: rgba(255, 255, 255, 0.04);
        border: 1px solid rgba(255, 255, 255, 0.09);
        border-radius: 10px;
        padding: 0.5rem;
    }

    .price-col {
        text-align: center;
        border-right: 1px dashed rgba(255, 255, 255, 0.1);
    }

    .price-col:last-child {
        border-right: none;
    }

    .price-label {
        display: block;
        font-size: 0.65rem;
        color: var(--wf-text-secondary);
        text-transform: uppercase;
        margin-bottom: 2px;
    }

    .price-val {
        font-size: 0.85rem;
        font-weight: 700;
    }

    .summary-actions {
        margin-top: 0.75rem;
        display: flex;
        gap: 0.45rem;
        flex-wrap: wrap;
    }

    .summary-actions .btn {
        font-size: 0.75rem;
        font-weight: 700;
    }

    .offer-section {
        padding: 0.95rem;
    }

    .offer-section-title {
        font-size: 0.9rem;
        margin: 0 0 0.55rem;
        font-weight: 700;
        color: var(--wf-text);
    }

    .meta-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 0.5rem;
    }

    .meta-item {
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 9px;
        background: rgba(255, 255, 255, 0.03);
        padding: 0.4rem;
    }

    .meta-top {
        display: flex;
        align-items: center;
        gap: 4px;
        color: var(--wf-text-secondary);
        font-size: 0.67rem;
        margin-bottom: 3px;
    }

    .meta-value {
        font-size: 0.75rem;
        font-weight: 600;
        color: var(--wf-text);
    }

    .offer-desc {
        color: var(--wf-text-secondary);
        font-size: 0.88rem;
        line-height: 1.55;
        white-space: pre-wrap;
    }

    .loading-state {
        min-height: 220px;
        border-radius: 12px;
        border: 1px solid var(--wf-border);
        background: linear-gradient(90deg, rgba(255, 255, 255, 0.04) 20%, rgba(255, 255, 255, 0.08) 50%, rgba(255, 255, 255, 0.04) 80%);
        background-size: 200% 100%;
        animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
        0% { background-position: 200% 0; }
        100% { background-position: -200% 0; }
    }

    @media (max-width: 980px) {
        .offer-detail-layout {
            grid-template-columns: 1fr;
        }

        .offer-main-image {
            height: 280px;
        }
    }

    @media (max-width: 640px) {
        .meta-grid {
            grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .offer-fruit-name {
            font-size: 1.3rem;
        }
    }
</style>

<div class="offer-detail-header">
    <a href="/offers" class="btn btn-wf-secondary">&larr; Voltar para ofertas</a>
    <span class="wf-badge wf-badge-neutral" id="offerStatus">Carregando...</span>
</div>

<div id="offerDetailRoot">
    <div class="loading-state"></div>
</div>

<script>
    const OFFER_ID = "{{ offer_id }}";
    let offerData = null;

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text ?? '';
        return div.innerHTML;
    }

    function toCurrency(value) {
        if (value === null || value === undefined || Number.isNaN(Number(value))) {
            return 'R$ -';
        }
        return `R$ ${Number(value).toFixed(2)}`;
    }

    function toDate(value) {
        if (!value) return '-';
        const d = new Date(value);
        if (Number.isNaN(d.getTime())) return String(value);
        return d.toLocaleDateString('pt-BR');
    }

    function fallbackImageSvg(label) {
        const safeLabel = encodeURIComponent((label || 'Fruta').slice(0, 16));
        const svg = `<svg xmlns='http://www.w3.org/2000/svg' width='1200' height='700'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0%' stop-color='%23171923'/><stop offset='100%' stop-color='%23272a39'/></linearGradient></defs><rect width='100%' height='100%' fill='url(%23g)'/><circle cx='920' cy='180' r='130' fill='%23EDA44C' opacity='0.2'/><text x='50%' y='82%' dominant-baseline='middle' text-anchor='middle' fill='%23e8e8ed' font-size='44' font-family='Arial'>${safeLabel}</text></svg>`;
        return `data:image/svg+xml;utf8,${svg}`;
    }

    function getImages(offer) {
        if (Array.isArray(offer.images) && offer.images.length) {
            return offer.images;
        }
        return [fallbackImageSvg(offer.product_name)];
    }

    function ownerUsername(offer) {
        const email = offer.owner_data?.email || '';
        if (email.includes('@')) return '@' + email.split('@')[0];
        return '@produtor' + (offer.owner_data?.id || offer.user_id || '0');
    }

    function ownerAvatarHtml(offer) {
        if (offer.owner_data?.profile_image) {
            return `<img class="producer-avatar" src="${escapeHtml(offer.owner_data.profile_image)}" alt="Avatar do produtor">`;
        }

        const name = offer.owner_data?.name || 'Produtor';
        const initials = name.split(' ').filter(Boolean).slice(0, 2).map((p) => p[0].toUpperCase()).join('') || 'PR';
        return `<span class="producer-avatar-fallback">${escapeHtml(initials)}</span>`;
    }

    function renderMetaItem(icon, label, value) {
        return `
            <div class="meta-item">
                <div class="meta-top">
                    <span class="material-symbols-outlined">${icon}</span>
                    <span>${escapeHtml(label)}</span>
                </div>
                <div class="meta-value" title="${escapeHtml(String(value))}">${escapeHtml(String(value))}</div>
            </div>
        `;
    }

    function renderOffer(offer) {
        const images = getImages(offer);
        const min = offer.price_min_kg ?? offer.price_per_kg ?? offer.price;
        const perKg = offer.price_per_kg ?? offer.price_avg_kg ?? offer.price;
        const max = offer.price_max_kg ?? offer.price_per_kg ?? offer.price;

        const gridOne = [
            renderMetaItem('balance', 'Quantidade', `${offer.available_quantity || offer.quantity || '-'} ${offer.unit || 'kg'}`),
            renderMetaItem('wifi', 'Disponivel', offer.status || '-'),
            renderMetaItem('list', 'Qualidade', offer.quality_class || offer.quality_grade || '-'),
            renderMetaItem('workspace_premium', 'Certificacao', offer.certification || '-'),
            renderMetaItem('timer', 'Duracao', offer.ad_duration_days ? `${offer.ad_duration_days} dias` : (offer.shelf_life ? `${offer.shelf_life} dias` : '-')),
            renderMetaItem('storefront', 'Mercado', offer.target_market || offer.origin || '-'),
        ].join('');

        const gridTwo = [
            renderMetaItem('pin_drop', 'Localizacao', offer.location || '-'),
            renderMetaItem('eco', 'Origem', offer.origin || '-'),
            renderMetaItem('compost', 'Maturacao', offer.maturation || '-'),
            renderMetaItem('calendar_month', 'Colheita', toDate(offer.harvest_date_actual || offer.harvest_date)),
            renderMetaItem('calendar_clock', 'Reserva inicio', toDate(offer.reservation_start)),
            renderMetaItem('event_busy', 'Reserva fim', toDate(offer.reservation_end)),
        ].join('');

        return `
            <div class="offer-detail-layout">
                <div>
                    <section class="offer-gallery">
                        <img id="mainOfferImage" class="offer-main-image" src="${escapeHtml(images[0])}" alt="Imagem da oferta">
                        <div class="offer-thumbs">
                            ${images.map((img, idx) => `<button class="offer-thumb-btn" type="button" onclick="setMainImage('${escapeHtml(img)}')" title="Imagem ${idx + 1}"><img src="${escapeHtml(img)}" alt="Miniatura ${idx + 1}"></button>`).join('')}
                        </div>
                    </section>

                    <section class="offer-section" style="margin-top: 1rem;">
                        <h2 class="offer-section-title">Descricao da oferta</h2>
                        <div class="offer-desc">${escapeHtml(offer.description || 'Sem descricao cadastrada.')}</div>
                    </section>

                    <section class="offer-section" style="margin-top: 1rem;">
                        <h2 class="offer-section-title">Informacoes tecnicas</h2>
                        <div class="meta-grid">${gridOne}</div>
                    </section>

                    <section class="offer-section" style="margin-top: 1rem;">
                        <h2 class="offer-section-title">Origem e periodo</h2>
                        <div class="meta-grid">${gridTwo}</div>
                    </section>

                    <section class="offer-section" style="margin-top: 1rem;">
                        <h2 class="offer-section-title">Propriedade</h2>
                        <div class="meta-grid">
                            ${renderMetaItem('home_work', 'Nome da propriedade', offer.property_name || '-')}
                            ${renderMetaItem('route', 'Endereco', offer.property_address || '-')}
                            ${renderMetaItem('inventory_2', 'Caixas minimas', offer.min_boxes_to_negotiate || '-')}
                        </div>
                    </section>
                </div>

                <aside class="offer-summary">
                    <div class="producer-row">
                        ${ownerAvatarHtml(offer)}
                        <div>
                            <div class="producer-name">${escapeHtml(offer.owner_data?.name || 'Produtor')}</div>
                            <div class="producer-username">${escapeHtml(ownerUsername(offer))}</div>
                        </div>
                    </div>

                    <h1 class="offer-fruit-name">${escapeHtml(offer.product_name)}</h1>

                    <div class="price-box">
                        <div class="price-col">
                            <span class="price-label">Preco min</span>
                            <span class="price-val">${toCurrency(min)}</span>
                        </div>
                        <div class="price-col">
                            <span class="price-label">Preco/kg</span>
                            <span class="price-val">${toCurrency(perKg)}</span>
                        </div>
                        <div class="price-col">
                            <span class="price-label">Preco max</span>
                            <span class="price-val">${toCurrency(max)}</span>
                        </div>
                    </div>

                    <div class="summary-actions">
                        <button class="btn btn-wf-primary" onclick="notifyProducer()">Avisar</button>
                        <button class="btn btn-wf-secondary" onclick="reserveOffer()">Reservar</button>
                        <button class="btn btn-wf-ghost" onclick="toggleFavorite()" id="favBtn">Curtir</button>
                    </div>
                </aside>
            </div>
        `;
    }

    function setMainImage(url) {
        const img = document.getElementById('mainOfferImage');
        if (img) img.src = url;
    }

    async function notifyProducer() {
        if (!offerData) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        const receiverId = offerData.owner_data?.id;
        if (!receiverId) {
            alert('Nao foi possivel identificar o produtor.');
            return;
        }

        const content = prompt('Digite sua mensagem para o produtor:');
        if (!content) return;

        try {
            await apiRequest('/messages', 'POST', {
                receiver_id: receiverId,
                offer_id: offerData.id,
                message_type: 'offer_inquiry',
                subject: `Interesse na oferta: ${offerData.product_name}`,
                content,
            });
            alert('Mensagem enviada com sucesso.');
        } catch (error) {
            alert(error.message || 'Falha ao enviar mensagem.');
        }
    }

    async function reserveOffer() {
        if (!offerData) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        const defaultQty = Number(offerData.min_order || 1);
        const rawQty = prompt(`Quantidade para reservar (${offerData.unit || 'kg'}):`, String(defaultQty));
        if (rawQty === null) return;

        const quantity = Number(rawQty);
        if (!quantity || quantity <= 0) {
            alert('Quantidade invalida.');
            return;
        }

        try {
            await apiRequest('/transactions', 'POST', {
                offer_id: offerData.id,
                quantity,
                delivery_method: 'pickup',
                payment_method: 'transfer',
            });
            alert('Reserva criada com sucesso.');
        } catch (error) {
            alert(error.message || 'Falha ao criar reserva.');
        }
    }

    async function toggleFavorite() {
        if (!offerData) return;

        if (!localStorage.getItem('token')) {
            window.location.href = '/login';
            return;
        }

        try {
            if (offerData.is_favorited) {
                await apiRequest(`/favorites/${offerData.id}`, 'DELETE');
                offerData.is_favorited = false;
            } else {
                await apiRequest('/favorites', 'POST', { offer_id: offerData.id });
                offerData.is_favorited = true;
            }

            document.getElementById('favBtn').textContent = offerData.is_favorited ? 'Curtido' : 'Curtir';
        } catch (error) {
            alert(error.message || 'Falha ao atualizar favorito.');
        }
    }

    async function loadOfferDetail() {
        const root = document.getElementById('offerDetailRoot');
        try {
            const offer = await apiRequest(`/offers/${OFFER_ID}`);
            offerData = offer;

            root.innerHTML = renderOffer(offer);

            const statusEl = document.getElementById('offerStatus');
            statusEl.textContent = offer.status || 'active';
            statusEl.className = 'wf-badge ' + (offer.status === 'active' ? 'wf-badge-active' : 'wf-badge-neutral');
        } catch (error) {
            root.innerHTML = `<div class="wf-alert wf-alert-error">${escapeHtml(error.message || 'Falha ao carregar detalhes da oferta.')}</div>`;
            document.getElementById('offerStatus').textContent = 'erro';
            document.getElementById('offerStatus').className = 'wf-badge wf-badge-neutral';
        }
    }

    loadOfferDetail();
</script>
{% endblock %}
