<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Agente IA WallFruits</title>
  <style>
    :root {
      --ai-bg: #f5f8fc;
      --ai-card: #ffffff;
      --ai-border: #d9e4f2;
      --ai-primary: #0b2e63;
      --ai-secondary: #0f8a4a;
      --ai-muted: #5a6f8c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Manrope, -apple-system, BlinkMacSystemFont, sans-serif;
      background: var(--ai-bg);
      color: #102743;
    }
    .wrap {
      height: 100vh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 0.8rem;
      gap: 0.7rem;
    }
    .head {
      background: linear-gradient(120deg, #ffdf00 0%, #ffe971 100%);
      border: 1px solid rgba(11, 46, 99, 0.14);
      border-radius: 14px;
      padding: 0.75rem 0.9rem;
    }
    .head h1 {
      margin: 0;
      font-size: 1rem;
      color: var(--ai-primary);
      font-weight: 900;
      letter-spacing: -0.01em;
    }
    .head p {
      margin: 0.35rem 0 0;
      color: #1f467f;
      font-size: 0.8rem;
      font-weight: 600;
    }
    .chat {
      background: var(--ai-card);
      border: 1px solid var(--ai-border);
      border-radius: 14px;
      overflow: auto;
      padding: 0.75rem;
      display: grid;
      gap: 0.55rem;
    }
    .msg {
      max-width: 90%;
      padding: 0.62rem 0.78rem;
      border-radius: 12px;
      font-size: 0.86rem;
      line-height: 1.45;
      white-space: pre-wrap;
    }
    .msg.user {
      margin-left: auto;
      background: #0b2e63;
      color: #fff;
    }
    .msg.ai {
      margin-right: auto;
      background: #eef4fb;
      border: 1px solid #d4e2f4;
      color: #193b6b;
    }
    .composer {
      background: var(--ai-card);
      border: 1px solid var(--ai-border);
      border-radius: 14px;
      padding: 0.5rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 0.5rem;
    }
    .composer textarea {
      border: none;
      resize: none;
      min-height: 44px;
      max-height: 120px;
      padding: 0.55rem 0.6rem;
      font-family: inherit;
      font-size: 0.88rem;
      color: #183b6b;
      background: transparent;
    }
    .composer textarea:focus { outline: none; }
    .composer button {
      border: none;
      border-radius: 10px;
      background: var(--ai-secondary);
      color: #fff;
      font-weight: 800;
      padding: 0 0.9rem;
      min-width: 88px;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="head">
      <h1>Assistente Inteligente WallFruits</h1>
      <p>Pergunte sobre contas, ofertas, loja agro, pagamentos, negociações, perfil, notificações e uso da plataforma.</p>
    </header>

    <main class="chat" id="chatBox">
      <div class="msg ai">Olá! Sou o assistente da WallFruits. Posso responder dúvidas sobre toda a plataforma e orientar você em qualquer fluxo.</div>
    </main>

    <form class="composer" id="chatForm">
      <textarea id="questionInput" placeholder="Digite sua pergunta..."></textarea>
      <button type="submit">Enviar</button>
    </form>
  </div>

  <script>
    const chatBox = document.getElementById('chatBox');
    const chatForm = document.getElementById('chatForm');
    const input = document.getElementById('questionInput');

    function appendMessage(kind, text) {
      const node = document.createElement('div');
      node.className = `msg ${kind}`;
      node.textContent = text;
      chatBox.appendChild(node);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    async function askAgent(question) {
      const token = localStorage.getItem('token');
      const headers = { 'Content-Type': 'application/json' };
      if (token) headers['Authorization'] = `Bearer ${token}`;

      const response = await fetch('/api/ai-agent/ask', {
        method: 'POST',
        headers,
        body: JSON.stringify({ question }),
      });

      const data = await response.json().catch(() => ({}));
      if (!response.ok) {
        throw new Error(data?.detail || data?.message || `Erro HTTP ${response.status}`);
      }
      return data;
    }

    chatForm.addEventListener('submit', async (event) => {
      event.preventDefault();
      const question = input.value.trim();
      if (!question) return;

      appendMessage('user', question);
      input.value = '';
      input.disabled = true;

      try {
        const result = await askAgent(question);
        appendMessage('ai', result.answer || 'Não consegui responder agora.');
      } catch (err) {
        appendMessage('ai', `Erro ao consultar assistente: ${err.message || 'falha inesperada'}`);
      } finally {
        input.disabled = false;
        input.focus();
      }
    });
  </script>
</body>
</html>
